<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎮 坦克大战</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="ui-overlay">
            <div id="score-board">
                <span>🎯 分数：<span id="score">0</span></span>
                <span>❤️ 生命：<span id="lives">3</span></span>
                <span>🎮 关卡：<span id="level">1</span></span>
            </div>
        </div>
        <div id="start-screen">
            <h1>🎮 坦克大战</h1>
            <p>Tank Battle V1.0.0</p>
            <button id="start-btn">开始游戏</button>
            <div class="controls">
                <p>🎯 控制：方向键移动，空格键射击</p>
                <p>🏠 目标：保护基地，消灭所有敌机</p>
            </div>
        </div>
        <div id="game-over-screen" style="display:none;">
            <h1 id="game-over-title">游戏结束</h1>
            <p>最终分数：<span id="final-score">0</span></p>
            <button id="restart-btn">重新开始</button>
        </div>
    </div>
    
    <script src="js/config.js"></script>
    <script src="js/perf-monitor.js"></script>
    <script src="js/collision.js"></script>
    <script src="js/bullet.js"></script>
    <script src="js/map.js"></script>
    <script src="js/player.js"></script>
    <script src="js/ai/state-machine.js"></script>
    <script src="js/ai/behavior-tree.js"></script>
    <script src="js/enemy.js"></script>
    <script src="js/game.js"></script>
    <script src="js/editor.js"></script>
</body>
</html>

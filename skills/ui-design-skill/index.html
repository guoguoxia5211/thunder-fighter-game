<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UI Design Skill - 启动页</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        .container {
            text-align: center;
            padding: 40px;
            max-width: 600px;
        }
        h1 {
            font-size: 36px;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #00d4ff 0%, #0099ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            font-size: 16px;
            color: rgba(255,255,255,0.7);
            margin-bottom: 32px;
            line-height: 1.6;
        }
        .btn-group {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #00d4ff 0%, #0099ff 100%);
            color: #fff;
            box-shadow: 0 4px 15px rgba(0,212,255,0.4);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,212,255,0.6);
        }
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.15);
        }
        .features {
            margin-top: 48px;
            text-align: left;
        }
        .features h3 {
            font-size: 18px;
            margin-bottom: 16px;
            color: #00d4ff;
        }
        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
        }
        .feature-item {
            background: rgba(255,255,255,0.05);
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .feature-item::before {
            content: '✓';
            color: #00d4ff;
            margin-right: 8px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 UI Design Skill</h1>
        <p>游戏 UI 美术设计系统<br>快速生成可定制的游戏主界面，支持实时预览和配置</p>
        
        <div class="btn-group">
            <a href="ui-design.html" class="btn btn-primary">
                🚀 开始设计
            </a>
            <a href="examples/README.md" class="btn btn-secondary" target="_blank">
                📖 使用文档
            </a>
        </div>

        <div class="features">
            <h3>核心功能</h3>
            <div class="feature-grid">
                <div class="feature-item">4 种布局预设</div>
                <div class="feature-item">4 种主题风格</div>
                <div class="feature-item">8 种字体选择</div>
                <div class="feature-item">8 种背景底纹</div>
                <div class="feature-item">按钮独立定制</div>
                <div class="feature-item">实时预览</div>
                <div class="feature-item">自动保存</div>
                <div class="feature-item">导出设计</div>
            </div>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ 雷霆战机 - 配置系统 v4</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); 
            color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, 'Arial', sans-serif; 
            overflow-x: hidden;
        }
        
        .main-container {
            display: grid;
            grid-template-columns: 350px 1fr 250px;
            gap: 20px;
            padding: 20px;
            min-height: 100vh;
        }
        
        /* 左侧配置面板 */
        .config-panel {
            background: rgba(26, 26, 46, 0.9);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 15px;
            max-height: calc(100vh - 40px);
            overflow-y: auto;
        }
        
        /* 中间预览窗口 */
        .preview-panel {
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 15px;
            display: flex;
            flex-direction: column;
        }
        
        /* 右侧操作面板 */
        .action-panel {
            background: rgba(26, 26, 46, 0.9);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 15px;
            max-height: calc(100vh - 40px);
            overflow-y: auto;
        }
        
        /* 可折叠面板 */
        .accordion {
            margin-bottom: 15px;
        }
        .accordion-header {
            background: rgba(78, 205, 196, 0.2);
            border: 1px solid #4ecdc4;
            border-radius: 10px;
            padding: 12px 15px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }
        .accordion-header:hover {
            background: rgba(78, 205, 196, 0.3);
        }
        .accordion-header .icon {
            font-size: 18px;
            transition: transform 0.3s;
        }
        .accordion-header.active .icon {
            transform: rotate(180deg);
        }
        .accordion-content {
            display: none;
            padding: 15px 10px;
            animation: slideDown 0.3s ease;
        }
        .accordion-content.show {
            display: block;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* 滑块样式 */
        .slider-group {
            margin: 15px 0;
        }
        .slider-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            color: #95a5a6;
            font-size: 13px;
        }
        .slider-value {
            color: #f39c12;
            font-weight: bold;
        }
        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: rgba(255,255,255,0.1);
            outline: none;
            -webkit-appearance: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #f39c12;
            cursor: pointer;
            -webkit-appearance: none;
        }
        
        /* 按钮样式 */
        .action-btn {
            background: linear-gradient(45deg, #f39c12, #e67e22);
            border: none;
            color: white;
            padding: 12px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            margin: 8px 0;
            width: 100%;
            transition: transform 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .action-btn:active { transform: scale(0.95); }
        .action-btn.secondary {
            background: linear-gradient(45deg, #95a5a6, #7f8c8d);
        }
        .action-btn.success {
            background: linear-gradient(45deg, #27ae60, #2ecc71);
        }
        .action-btn.primary {
            background: linear-gradient(45deg, #3498db, #2980b9);
        }
        
        /* 资源上传 */
        .resource-upload {
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            padding: 12px;
            margin: 10px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .resource-upload span {
            color: #4ecdc4;
            font-size: 13px;
        }
        .upload-btn-small {
            background: #3498db;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 11px;
        }
        
        /* 预览 iframe */
        .preview-frame {
            flex: 1;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            min-height: 500px;
        }
        .preview-frame iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        /* 状态条 */
        .status-bar {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(46, 204, 113, 0.9);
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            z-index: 1000;
            display: none;
            animation: slideIn 0.3s ease;
        }
        .status-bar.show { display: block; }
        @keyframes slideIn {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        /* Token 配置 - 底部小图标 */
        .token-settings {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 1000;
        }
        .token-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(45deg, #f39c12, #e67e22);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            transition: transform 0.2s;
            font-size: 24px;
        }
        .token-icon:active { transform: scale(0.95); }
        .token-popup {
            position: fixed;
            bottom: 80px;
            left: 20px;
            background: rgba(26, 26, 46, 0.95);
            border: 2px solid #f39c12;
            border-radius: 15px;
            padding: 20px;
            width: 300px;
            display: none;
            animation: slideUp 0.3s ease;
            z-index: 1000;
        }
        .token-popup.show { display: block; }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .token-popup input {
            width: 100%;
            background: rgba(0,0,0,0.5);
            border: 2px solid #f39c12;
            border-radius: 10px;
            padding: 10px 15px;
            color: #fff;
            font-size: 13px;
            margin: 10px 0;
        }
        .token-popup-buttons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .token-popup-buttons button {
            flex: 1;
            padding: 10px;
            border-radius: 15px;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        .token-popup-buttons .save-btn {
            background: linear-gradient(45deg, #27ae60, #2ecc71);
            color: white;
        }
        .token-popup-buttons .close-btn {
            background: linear-gradient(45deg, #95a5a6, #7f8c8d);
            color: white;
        }
        
        /* 响应式 */
        @media (max-width: 1200px) {
            .main-container {
                grid-template-columns: 300px 1fr;
            }
            .action-panel {
                grid-column: 1;
                grid-row: 2;
                max-height: none;
            }
        }
        
        @media (max-width: 768px) {
            .main-container {
                grid-template-columns: 1fr;
                padding: 10px;
            }
            .action-panel {
                grid-column: 1;
                grid-row: 3;
            }
            .preview-frame {
                min-height: 300px;
            }
            .token-settings {
                bottom: 10px;
                left: 10px;
            }
            .token-popup {
                bottom: 70px;
                left: 10px;
                width: calc(100% - 20px);
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- 左侧配置面板 -->
        <div class="config-panel">
            <h2 style="text-align: center; color: #f39c12; margin-bottom: 20px;">⚙️ 配置面板</h2>
            
            <!-- 游戏数值 -->
            <div class="accordion">
                <div class="accordion-header active" onclick="toggleAccordion(this)">
                    <span>⚙️ 游戏数值</span>
                    <span class="icon">▼</span>
                </div>
                <div class="accordion-content show">
                    <div class="slider-group">
                        <div class="slider-label">
                            <span>玩家速度</span>
                            <span class="slider-value" id="value_speed">5</span>
                        </div>
                        <input type="range" id="speed" min="1" max="10" value="5" oninput="updateValue('speed', this.value)">
                    </div>
                    <div class="slider-group">
                        <div class="slider-label">
                            <span>玩家血量</span>
                            <span class="slider-value" id="value_health">3</span>
                        </div>
                        <input type="range" id="health" min="1" max="10" value="3" oninput="updateValue('health', this.value)">
                    </div>
                    <div class="slider-group">
                        <div class="slider-label">
                            <span>玩家伤害</span>
                            <span class="slider-value" id="value_damage">1</span>
                        </div>
                        <input type="range" id="damage" min="1" max="10" value="1" oninput="updateValue('damage', this.value)">
                    </div>
                    <div class="slider-group">
                        <div class="slider-label">
                            <span>玩家射速</span>
                            <span class="slider-value" id="value_fireRate">1</span>
                        </div>
                        <input type="range" id="fireRate" min="1" max="10" value="1" oninput="updateValue('fireRate', this.value)">
                    </div>
                    <div class="slider-group">
                        <div class="slider-label">
                            <span>敌人生成频率</span>
                            <span class="slider-value" id="value_spawnRate">5</span>
                        </div>
                        <input type="range" id="spawnRate" min="1" max="10" value="5" oninput="updateValue('spawnRate', this.value)">
                    </div>
                    <div class="slider-group">
                        <div class="slider-label">
                            <span>重力系数</span>
                            <span class="slider-value" id="value_gravity">0.8</span>
                        </div>
                        <input type="range" id="gravity" min="0.1" max="2.0" step="0.1" value="0.8" oninput="updateValue('gravity', this.value)">
                    </div>
                </div>
            </div>
            
            <!-- 美术资源 -->
            <div class="accordion">
                <div class="accordion-header" onclick="toggleAccordion(this)">
                    <span>🎨 美术资源</span>
                    <span class="icon">▼</span>
                </div>
                <div class="accordion-content">
                    <div class="resource-upload">
                        <span>🎮 玩家飞机</span>
                        <button class="upload-btn-small" onclick="uploadResource('player')">📤 上传</button>
                        <input type="file" id="upload_player" accept="image/*" style="display:none" onchange="handleFileSelect('player', event)">
                    </div>
                    <div class="resource-upload">
                        <span>👾 史莱姆</span>
                        <button class="upload-btn-small" onclick="uploadResource('slime')">📤 上传</button>
                        <input type="file" id="upload_slime" accept="image/*" style="display:none" onchange="handleFileSelect('slime', event)">
                    </div>
                    <div class="resource-upload">
                        <span>🍄 蘑菇怪</span>
                        <button class="upload-btn-small" onclick="uploadResource('mushroom')">📤 上传</button>
                        <input type="file" id="upload_mushroom" accept="image/*" style="display:none" onchange="handleFileSelect('mushroom', event)">
                    </div>
                    <div class="resource-upload">
                        <span>👹 精英怪</span>
                        <button class="upload-btn-small" onclick="uploadResource('elite')">📤 上传</button>
                        <input type="file" id="upload_elite" accept="image/*" style="display:none" onchange="handleFileSelect('elite', event)">
                    </div>
                    <div class="resource-upload">
                        <span>🐲 Boss</span>
                        <button class="upload-btn-small" onclick="uploadResource('boss')">📤 上传</button>
                        <input type="file" id="upload_boss" accept="image/*" style="display:none" onchange="handleFileSelect('boss', event)">
                    </div>
                    <div class="resource-upload">
                        <span>🌌 背景</span>
                        <button class="upload-btn-small" onclick="uploadResource('bg')">📤 上传</button>
                        <input type="file" id="upload_bg" accept="image/*" style="display:none" onchange="handleFileSelect('bg', event)">
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 中间预览窗口 -->
        <div class="preview-panel">
            <h2 style="text-align: center; color: #3498db; margin-bottom: 15px;">🎮 实时预览</h2>
            <div class="preview-frame">
                <iframe id="gamePreview" src="../index.html"></iframe>
            </div>
        </div>
        
        <!-- 右侧操作面板 -->
        <div class="action-panel">
            <h2 style="text-align: center; color: #2ecc71; margin-bottom: 20px;">⚡ 快捷操作</h2>
            
            <button class="action-btn primary" onclick="openPreview()">🔗 打开预览</button>
            <button class="action-btn success" onclick="refreshPreview()">🔄 刷新预览</button>
            <button class="action-btn" onclick="copyGameLink()">📋 复制链接</button>
            
            <div style="border-top: 2px solid rgba(255,255,255,0.1); margin: 20px 0;"></div>
            
            <button class="action-btn success" onclick="deployConfig()">🚀 部署配置</button>
            <button class="action-btn secondary" onclick="resetConfig()">🔄 重置默认</button>
            
            <div style="margin-top: 30px; padding: 15px; background: rgba(52, 152, 219, 0.1); border-radius: 10px;">
                <h4 style="color: #3498db; margin-bottom: 10px;">💡 使用提示</h4>
                <ol style="color: #95a5a6; font-size: 12px; padding-left: 20px;">
                    <li>调整数值或上传资源</li>
                    <li>点击"刷新预览"查看效果</li>
                    <li>满意后点击"部署配置"</li>
                    <li>等待部署完成后刷新游戏</li>
                </ol>
            </div>
        </div>
    </div>
    
    <!-- 底部 Token 配置 -->
    <div class="token-settings">
        <div class="token-icon" onclick="toggleTokenPopup()" title="GitHub Token 设置">
            🔑
        </div>
    </div>
    
    <div class="token-popup" id="tokenPopup">
        <h3 style="color: #f39c12; margin-bottom: 10px;">🔑 GitHub Token 设置</h3>
        <input type="password" id="githubToken" placeholder="输入 GitHub Token (ghp_开头)">
        <div class="token-popup-buttons">
            <button class="save-btn" onclick="saveToken()">💾 保存</button>
            <button class="close-btn" onclick="toggleTokenPopup()">✕ 关闭</button>
        </div>
        <div id="tokenStatus" style="margin-top: 10px; font-size: 11px; color: #95a5a6;"></div>
    </div>
    
    <div id="statusBar" class="status-bar"></div>
    
    <script>
        const GITHUB_REPO = 'guoguoxia5211/thunder-fighter-game';
        let githubToken = localStorage.getItem('github_token') || '';
        
        let config = {
            version: "4.0.0",
            player: { speed: 5, health: 3, damage: 1, fireRate: 1 },
            enemies: { spawnRate: 5 },
            game: { gravity: 0.8 }
        };
        
        let uploadedFiles = {};
        let previewWindow = null;
        
        window.onload = function() {
            if (githubToken) {
                document.getElementById('githubToken').value = githubToken;
                document.getElementById('tokenStatus').textContent = '✅ Token 已保存';
            }
        };
        
        function toggleAccordion(header) {
            header.classList.toggle('active');
            const content = header.nextElementSibling;
            content.classList.toggle('show');
        }
        
        function toggleTokenPopup() {
            const popup = document.getElementById('tokenPopup');
            popup.classList.toggle('show');
        }
        
        function saveToken() {
            const token = document.getElementById('githubToken').value.trim();
            if (!token) { alert('请输入 Token'); return; }
            if (!token.startsWith('ghp_')) { alert('Token 格式错误'); return; }
            githubToken = token;
            localStorage.setItem('github_token', token);
            document.getElementById('tokenStatus').textContent = '✅ Token 已保存';
            showStatus('✅ Token 已保存！', 'success');
            toggleTokenPopup();
        }
        
        function updateValue(key, value) {
            document.getElementById('value_' + key).textContent = value;
            
            if (key === 'speed') config.player.speed = parseFloat(value);
            if (key === 'health') config.player.health = parseFloat(value);
            if (key === 'damage') config.player.damage = parseFloat(value);
            if (key === 'fireRate') config.player.fireRate = parseFloat(value);
            if (key === 'spawnRate') config.enemies.spawnRate = parseFloat(value);
            if (key === 'gravity') config.game.gravity = parseFloat(value);
            
            sendConfigToPreview();
        }
        
        function sendConfigToPreview() {
            const iframe = document.getElementById('gamePreview');
            if (iframe && iframe.contentWindow) {
                iframe.contentWindow.postMessage({ type: 'UPDATE_CONFIG', config: config }, '*');
            }
        }
        
        function uploadResource(type) {
            document.getElementById('upload_' + type).click();
        }
        
        function handleFileSelect(type, event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                uploadedFiles[type] = {
                    file: file,
                    dataUrl: e.target.result,
                    base64Content: e.target.result.split(',')[1]
                };
                showStatus('✅ ' + file.name + ' 已上传，点击部署生效', 'success');
            };
            reader.readAsDataURL(file);
        }
        
        function openPreview() {
            const gameUrl = window.location.href.replace('config/index.html', 'index.html');
            previewWindow = window.open(gameUrl, 'gamePreview', 'width=800,height=600');
            showStatus('🎮 已打开游戏预览窗口', 'success');
        }
        
        function refreshPreview() {
            const iframe = document.getElementById('gamePreview');
            if (iframe) {
                iframe.src = iframe.src;
                showStatus('🔄 已刷新预览', 'success');
            }
        }
        
        function copyGameLink() {
            const link = 'https://guoguoxia5211.github.io/thunder-fighter-game/';
            navigator.clipboard.writeText(link).then(() => {
                showStatus('📋 链接已复制！', 'success');
            }).catch(() => {
                showStatus('❌ 复制失败，请手动复制链接', 'error');
            });
        }
        
        async function deployConfig() {
            if (!githubToken) {
                showStatus('❌ 请先保存 GitHub Token', 'error');
                toggleTokenPopup();
                return;
            }
            
            if (Object.keys(uploadedFiles).length === 0 && !confirm('确定要部署当前数值配置吗？')) {
                return;
            }
            
            showStatus('⏳ 正在部署配置...', 'info');
            
            try {
                const configBase64 = btoa(JSON.stringify(config, null, 2));
                await uploadToGitHub('config.json', configBase64, 'Update game config v' + config.version);
                
                for (const [type, fileData] of Object.entries(uploadedFiles)) {
                    let path = '';
                    if (type === 'player') path = 'player/classic.png';
                    if (type === 'slime') path = 'enemy/slime.png';
                    if (type === 'mushroom') path = 'enemy/mushroom.png';
                    if (type === 'elite') path = 'enemy/elite.png';
                    if (type === 'boss') path = 'enemy/boss.png';
                    if (type === 'bg') path = 'bg/space.png';
                    
                    if (path) {
                        await uploadToGitHub(path, fileData.base64Content, 'Update ' + type + ' resource');
                    }
                }
                
                showStatus('✅ 部署成功！请刷新预览', 'success');
                setTimeout(() => {
                    refreshPreview();
                    alert('✅ 部署成功！\n\n已自动刷新预览窗口查看效果');
                }, 2000);
                
            } catch (error) {
                showStatus('❌ 部署失败：' + error.message, 'error');
            }
        }
        
        async function uploadToGitHub(path, content, message) {
            const shaResponse = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${path}`, {
                headers: { 'Authorization': 'token ' + githubToken }
            });
            
            let sha = null;
            if (shaResponse.ok) {
                const data = await shaResponse.json();
                sha = data.sha;
            }
            
            const uploadData = { message: message, content: content };
            if (sha) uploadData.sha = sha;
            
            const response = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${path}`, {
                method: 'PUT',
                headers: {
                    'Authorization': 'token ' + githubToken,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(uploadData)
            });
            
            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.message);
            }
            
            return response;
        }
        
        function resetConfig() {
            if (confirm('确定要重置为默认配置吗？')) {
                config = {
                    version: "4.0.0",
                    player: { speed: 5, health: 3, damage: 1, fireRate: 1 },
                    enemies: { spawnRate: 5 },
                    game: { gravity: 0.8 }
                };
                
                document.getElementById('speed').value = 5;
                document.getElementById('health').value = 3;
                document.getElementById('damage').value = 1;
                document.getElementById('fireRate').value = 1;
                document.getElementById('spawnRate').value = 5;
                document.getElementById('gravity').value = 0.8;
                
                document.getElementById('value_speed').textContent = '5';
                document.getElementById('value_health').textContent = '3';
                document.getElementById('value_damage').textContent = '1';
                document.getElementById('value_fireRate').textContent = '1';
                document.getElementById('value_spawnRate').textContent = '5';
                document.getElementById('value_gravity').textContent = '0.8';
                
                sendConfigToPreview();
                showStatus('✅ 配置已重置为默认值', 'success');
            }
        }
        
        function showStatus(message, type) {
            const statusBar = document.getElementById('statusBar');
            statusBar.textContent = message;
            statusBar.style.background = type === 'success' ? 'rgba(46, 204, 113, 0.9)' : 
                                         type === 'error' ? 'rgba(231, 76, 60, 0.9)' : 'rgba(52, 152, 219, 0.9)';
            statusBar.classList.add('show');
            setTimeout(() => statusBar.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>

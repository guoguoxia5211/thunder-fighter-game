<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ 雷霆战机 - 配置系统 v1.5.0</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); 
            color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, 'Arial', sans-serif; 
            padding: 20px; 
            min-height: 100vh; 
        }
        .main-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .config-panel {
            background: rgba(26, 26, 46, 0.9);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            max-height: calc(100vh - 40px);
            overflow-y: auto;
        }
        .preview-panel {
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            max-height: calc(100vh - 40px);
            overflow-y: auto;
        }
        .accordion { margin-bottom: 15px; }
        .accordion-header {
            background: rgba(78, 205, 196, 0.2);
            border: 1px solid #4ecdc4;
            border-radius: 10px;
            padding: 12px 15px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .accordion-header:hover { background: rgba(78, 205, 196, 0.3); }
        .accordion-header .icon { font-size: 18px; transition: transform 0.3s; }
        .accordion-header.active .icon { transform: rotate(180deg); }
        .accordion-content {
            display: none;
            padding: 15px 10px;
        }
        .accordion-content.show { display: block; }
        
        .slider-group { margin: 15px 0; }
        .slider-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            color: #95a5a6;
            font-size: 13px;
        }
        .slider-value { color: #f39c12; font-weight: bold; }
        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: rgba(255,255,255,0.1);
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #f39c12;
            cursor: pointer;
        }
        
        .resource-item {
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
        }
        .resource-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .resource-name {
            color: #4ecdc4;
            font-size: 14px;
            font-weight: bold;
        }
        .current-preview {
            text-align: center;
            margin: 10px 0;
        }
        .current-preview img {
            max-width: 150px;
            max-height: 150px;
            border-radius: 10px;
            border: 2px solid #4ecdc4;
        }
        .current-preview p {
            color: #95a5a6;
            font-size: 12px;
            margin-top: 5px;
        }
        .upload-section {
            text-align: center;
        }
        .upload-btn {
            background: linear-gradient(135deg, #3498db, #2980b9);
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .upload-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4);
        }
        
        .action-btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin: 10px 0;
            transition: all 0.3s;
        }
        .action-btn.success {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
        }
        .action-btn.success:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(39, 174, 96, 0.4);
        }
        .action-btn.primary {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
        }
        .action-btn.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4);
        }
        .action-btn.warning {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            color: white;
        }
        .action-btn.warning:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(243, 156, 12, 0.4);
        }
        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .status-bar {
            position: fixed;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(46, 204, 113, 0.9);
            color: white;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: bold;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            transition: bottom 0.3s;
            z-index: 1000;
        }
        .status-bar.show {
            bottom: 20px;
        }
        
        .config-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 20px 0;
        }
        
        .backup-list {
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
            max-height: 300px;
            overflow-y: auto;
        }
        .backup-item {
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            padding: 10px;
            margin: 8px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .backup-item:hover {
            background: rgba(255,255,255,0.1);
        }
        .backup-info {
            flex: 1;
        }
        .backup-name {
            color: #4ecdc4;
            font-size: 14px;
            font-weight: bold;
        }
        .backup-time {
            color: #95a5a6;
            font-size: 12px;
            margin-top: 4px;
        }
        .backup-actions {
            display: flex;
            gap: 8px;
        }
        .backup-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .backup-btn.load {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
        }
        .backup-btn.delete {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
        }
        .backup-btn:hover {
            transform: translateY(-2px);
        }
        
        h2 { color: #4ecdc4; margin-bottom: 20px; text-align: center; }
        h3 { color: #3498db; margin: 15px 0 10px; font-size: 16px; }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="config-panel">
            <h2>⚙️ 游戏配置</h2>
            
            <!-- 配置操作按钮 -->
            <div class="config-actions">
                <button class="action-btn primary" onclick="saveConfig()">💾 保存配置</button>
                <button class="action-btn warning" onclick="showBackupList()">📋 加载配置</button>
            </div>
            
            <div class="accordion">
                <div class="accordion-header" onclick="toggleAccordion(this)">
                    <span>🚀 玩家属性</span>
                    <span class="icon">▼</span>
                </div>
                <div class="accordion-content show">
                    <div class="slider-group">
                        <div class="slider-label">
                            <span>移动速度</span>
                            <span class="slider-value">当前：<span id="current_speed">5</span></span>
                        </div>
                        <input type="range" id="speed" min="1" max="10" value="5" oninput="updateValue('speed', this.value)">
                    </div>
                    <div class="slider-group">
                        <div class="slider-label">
                            <span>生命值</span>
                            <span class="slider-value">当前：<span id="current_health">3</span></span>
                        </div>
                        <input type="range" id="health" min="1" max="10" value="3" oninput="updateValue('health', this.value)">
                    </div>
                    <div class="slider-group">
                        <div class="slider-label">
                            <span>攻击力</span>
                            <span class="slider-value">当前：<span id="current_damage">1</span></span>
                        </div>
                        <input type="range" id="damage" min="1" max="5" value="1" oninput="updateValue('damage', this.value)">
                    </div>
                    <div class="slider-group">
                        <div class="slider-label">
                            <span>射击频率</span>
                            <span class="slider-value">当前：<span id="current_fireRate">1</span></span>
                        </div>
                        <input type="range" id="fireRate" min="1" max="10" value="1" oninput="updateValue('fireRate', this.value)">
                    </div>
                </div>
            </div>
            
            <div class="accordion">
                <div class="accordion-header" onclick="toggleAccordion(this)">
                    <span>👾 敌人设置</span>
                    <span class="icon">▼</span>
                </div>
                <div class="accordion-content">
                    <div class="slider-group">
                        <div class="slider-label">
                            <span>生成频率</span>
                            <span class="slider-value">当前：<span id="current_spawnRate">5</span></span>
                        </div>
                        <input type="range" id="spawnRate" min="1" max="20" value="5" oninput="updateValue('spawnRate', this.value)">
                    </div>
                </div>
            </div>
            
            <div class="accordion">
                <div class="accordion-header" onclick="toggleAccordion(this)">
                    <span>🌍 游戏物理</span>
                    <span class="icon">▼</span>
                </div>
                <div class="accordion-content">
                    <div class="slider-group">
                        <div class="slider-label">
                            <span>重力</span>
                            <span class="slider-value">当前：<span id="current_gravity">0.8</span></span>
                        </div>
                        <input type="range" id="gravity" min="0" max="2" step="0.1" value="0.8" oninput="updateValue('gravity', this.value)">
                    </div>
                </div>
            </div>
            
            <h3>🎨 资源替换</h3>
            
            <div class="resource-item">
                <div class="resource-header">
                    <span class="resource-name">🚀 玩家飞机</span>
                </div>
                <div class="current-preview">
                    <img id="preview_player" src="" alt="当前玩家">
                    <p>当前玩家</p>
                </div>
                <div class="upload-section">
                    <button class="upload-btn" onclick="uploadResource('player')">📤 替换图片</button>
                    <input type="file" id="upload_player" accept="image/*" style="display:none" onchange="handleFileSelect('player', event)">
                </div>
            </div>
            
            <div class="resource-item">
                <div class="resource-header">
                    <span class="resource-name">🦠 史莱姆</span>
                </div>
                <div class="current-preview">
                    <img id="preview_slime" src="" alt="当前史莱姆">
                    <p>当前史莱姆</p>
                </div>
                <div class="upload-section">
                    <button class="upload-btn" onclick="uploadResource('slime')">📤 替换图片</button>
                    <input type="file" id="upload_slime" accept="image/*" style="display:none" onchange="handleFileSelect('slime', event)">
                </div>
            </div>
            
            <div class="resource-item">
                <div class="resource-header">
                    <span class="resource-name">🍄 蘑菇怪</span>
                </div>
                <div class="current-preview">
                    <img id="preview_mushroom" src="" alt="当前蘑菇">
                    <p>当前蘑菇</p>
                </div>
                <div class="upload-section">
                    <button class="upload-btn" onclick="uploadResource('mushroom')">📤 替换图片</button>
                    <input type="file" id="upload_mushroom" accept="image/*" style="display:none" onchange="handleFileSelect('mushroom', event)">
                </div>
            </div>
            
            <div class="resource-item">
                <div class="resource-header">
                    <span class="resource-name">💀 精英怪</span>
                </div>
                <div class="current-preview">
                    <img id="preview_elite" src="" alt="当前精英">
                    <p>当前精英</p>
                </div>
                <div class="upload-section">
                    <button class="upload-btn" onclick="uploadResource('elite')">📤 替换图片</button>
                    <input type="file" id="upload_elite" accept="image/*" style="display:none" onchange="handleFileSelect('elite', event)">
                </div>
            </div>
            
            <div class="resource-item">
                <div class="resource-header">
                    <span class="resource-name">👹 BOSS</span>
                </div>
                <div class="current-preview">
                    <img id="preview_boss" src="" alt="当前 BOSS">
                    <p>当前 BOSS</p>
                </div>
                <div class="upload-section">
                    <button class="upload-btn" onclick="uploadResource('boss')">📤 替换图片</button>
                    <input type="file" id="upload_boss" accept="image/*" style="display:none" onchange="handleFileSelect('boss', event)">
                </div>
            </div>
            
            <div class="resource-item">
                <div class="resource-header">
                    <span class="resource-name">🌌 背景</span>
                </div>
                <div class="current-preview">
                    <img id="preview_bg" src="" alt="当前背景">
                    <p>当前背景</p>
                </div>
                <div class="upload-section">
                    <button class="upload-btn" onclick="uploadResource('bg')">📤 替换图片</button>
                    <input type="file" id="upload_bg" accept="image/*" style="display:none" onchange="handleFileSelect('bg', event)">
                </div>
            </div>
            
            <button class="action-btn success" onclick="deployConfig()">🚀 部署配置</button>
        </div>
        
        <div class="preview-panel">
            <h2 style="text-align: center; color: #3498db; margin-bottom: 20px;">🎮 游戏预览</h2>
            <iframe id="gamePreview" src="../" style="width: 100%; height: calc(100vh - 100px); border: 2px solid #3498db; border-radius: 10px;"></iframe>
        </div>
    </div>
    
    <!-- 备份列表模态框 -->
    <div id="backupModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:999;">
        <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:#1a1a2e; padding:30px; border-radius:15px; max-width:600px; width:90%; max-height:80vh; overflow-y:auto;">
            <h2 style="margin-bottom:20px;">📋 配置备份历史</h2>
            <div id="backupListContent" class="backup-list"></div>
            <button class="action-btn primary" onclick="closeBackupModal()" style="margin-top:15px;">❌ 关闭</button>
        </div>
    </div>
    
    <div id="statusBar" class="status-bar"></div>
    
    <script>
        const GITHUB_REPO = 'guoguoxia5211/thunder-fighter-game';
        let githubToken = localStorage.getItem('github_token') || '';
        
        let config = {
            version: "1.5.0",
            player: { speed: 5, health: 3, damage: 1, fireRate: 1 },
            enemies: { spawnRate: 5 },
            game: { gravity: 0.8 }
        };
        
        let uploadedFiles = {};
        
        // 从 localStorage 加载配置
        function loadConfig() {
            try {
                const saved = localStorage.getItem('thunder_config');
                console.log('从 localStorage 读取:', saved);
                
                if (saved) {
                    const cfg = JSON.parse(saved);
                    console.log('解析后的配置:', cfg);
                    
                    // 更新 config 对象
                    if (cfg.player) config.player = cfg.player;
                    if (cfg.enemies) config.enemies = cfg.enemies;
                    if (cfg.game) config.game = cfg.game;
                    
                    // 更新滑块的值
                    document.getElementById('speed').value = config.player.speed;
                    document.getElementById('health').value = config.player.health;
                    document.getElementById('damage').value = config.player.damage;
                    document.getElementById('fireRate').value = config.player.fireRate;
                    document.getElementById('spawnRate').value = config.enemies.spawnRate;
                    document.getElementById('gravity').value = config.game.gravity;
                    
                    // 更新显示值
                    document.getElementById('value_speed').textContent = config.player.speed;
                    document.getElementById('current_speed').textContent = config.player.speed;
                    document.getElementById('value_health').textContent = config.player.health;
                    document.getElementById('current_health').textContent = config.player.health;
                    document.getElementById('value_damage').textContent = config.player.damage;
                    document.getElementById('current_damage').textContent = config.player.damage;
                    document.getElementById('value_fireRate').textContent = config.player.fireRate;
                    document.getElementById('current_fireRate').textContent = config.player.fireRate;
                    document.getElementById('value_spawnRate').textContent = config.enemies.spawnRate;
                    document.getElementById('current_spawnRate').textContent = config.enemies.spawnRate;
                    document.getElementById('value_gravity').textContent = config.game.gravity;
                    document.getElementById('current_gravity').textContent = config.game.gravity;
                    
                    console.log('配置已加载到界面');
                    return true;
                }
            } catch (e) {
                console.error('加载配置失败:', e);
            }
            return false;
        }
        
        window.onload = function() {
            // 检查 Token
            if (!githubToken) {
                showStatus('⚠️ 请先保存 GitHub Token', 'error');
            }
            
            // 加载配置
            const loaded = loadConfig();
            if (loaded) {
                showStatus('✅ 已加载上次配置', 'success');
            } else {
                showStatus('ℹ️ 使用默认配置', 'info');
            }
            
            loadCurrentPreviews();
        };
        
        function toggleAccordion(header) {
            header.classList.toggle('active');
            const content = header.nextElementSibling;
            content.classList.toggle('show');
        }
        
        function updateValue(key, value) {
            document.getElementById('value_' + key).textContent = value;
            document.getElementById('current_' + key).textContent = value;
            
            if (key === 'speed') config.player.speed = parseFloat(value);
            if (key === 'health') config.player.health = parseFloat(value);
            if (key === 'damage') config.player.damage = parseFloat(value);
            if (key === 'fireRate') config.player.fireRate = parseFloat(value);
            if (key === 'spawnRate') config.enemies.spawnRate = parseFloat(value);
            if (key === 'gravity') config.game.gravity = parseFloat(value);
            
            // 保存到 localStorage
            localStorage.setItem('thunder_config', JSON.stringify(config));
            console.log('配置已保存到 localStorage:', config);
            
            sendConfigToPreview();
        }
        
        function sendConfigToPreview() {
            const iframe = document.getElementById('gamePreview');
            if (iframe && iframe.contentWindow) {
                iframe.contentWindow.postMessage({ type: 'UPDATE_CONFIG', config: config }, '*');
            }
        }
        
        function uploadResource(type) {
            document.getElementById('upload_' + type).click();
        }
        
        function handleFileSelect(type, event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                uploadedFiles[type] = {
                    file: file,
                    dataUrl: e.target.result,
                    base64Content: e.target.result.split(',')[1]
                };
                
                const previewImg = document.getElementById('preview_' + type);
                previewImg.src = e.target.result;
                
                showStatus('✅ ' + file.name + ' 已上传，点击部署生效', 'success');
            };
            reader.readAsDataURL(file);
        }
        
        function loadCurrentPreviews() {
            const BASE_URL = 'https://raw.githubusercontent.com/guoguoxia5211/thunder-fighter-game/main/';
            document.getElementById('preview_player').src = BASE_URL + 'player/classic.png?t=' + Date.now();
            document.getElementById('preview_slime').src = BASE_URL + 'enemy/small.png?t=' + Date.now();
            document.getElementById('preview_mushroom').src = BASE_URL + 'enemy/mushroom.png?t=' + Date.now();
            document.getElementById('preview_elite').src = BASE_URL + 'enemy/elite.png?t=' + Date.now();
            document.getElementById('preview_boss').src = BASE_URL + 'enemy/boss.png?t=' + Date.now();
            document.getElementById('preview_bg').src = BASE_URL + 'bg/space.png?t=' + Date.now();
        }
        
        // ========== 配置保存功能 v1.5.0 ==========
        
        // 保存配置到配置系统 + GitHub 备份
        async function saveConfig() {
            if (!githubToken) {
                showStatus('❌ 请先保存 GitHub Token', 'error');
                alert('⚠️ 需要 GitHub Token\n\n请前往 GitHub 设置生成 Token');
                return;
            }
            
            showStatus('⏳ 正在保存配置...', 'info');
            
            try {
                // 1. 保存到配置系统（localStorage + 配置系统）
                localStorage.setItem('thunder_config', JSON.stringify(config));
                
                // 2. 备份到 GitHub
                const timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, -5);
                const backupFileName = `backups/config_${timestamp}.json`;
                const configBase64 = btoa(JSON.stringify(config, null, 2));
                
                await uploadToGitHub(backupFileName, configBase64, `backup: config_${timestamp}.json`);
                
                // 3. 记录备份历史
                saveBackupHistory({
                    fileName: backupFileName,
                    timestamp: timestamp,
                    version: config.version
                });
                
                showStatus('✅ 配置已保存并备份到 GitHub', 'success');
                
            } catch (error) {
                showStatus('❌ 保存失败：' + error.message, 'error');
            }
        }
        
        // 保存备份历史到 localStorage
        function saveBackupHistory(backup) {
            let history = JSON.parse(localStorage.getItem('config_backup_history') || '[]');
            history.unshift(backup);
            if (history.length > 50) history = history.slice(0, 50); // 保留最近 50 条
            localStorage.setItem('config_backup_history', JSON.stringify(history));
        }
        
        // 显示备份列表
        function showBackupList() {
            const modal = document.getElementById('backupModal');
            const content = document.getElementById('backupListContent');
            
            let history = JSON.parse(localStorage.getItem('config_backup_history') || '[]');
            
            if (history.length === 0) {
                content.innerHTML = '<p style="text-align:center;color:#95a5a6;">暂无备份记录</p>';
            } else {
                content.innerHTML = history.map((backup, index) => `
                    <div class="backup-item">
                        <div class="backup-info">
                            <div class="backup-name">📦 ${backup.fileName}</div>
                            <div class="backup-time">⏰ ${backup.timestamp} | v${backup.version}</div>
                        </div>
                        <div class="backup-actions">
                            <button class="backup-btn load" onclick="loadBackup(${index})">📥 加载</button>
                            <button class="backup-btn delete" onclick="deleteBackup(${index})">🗑️ 删除</button>
                        </div>
                    </div>
                `).join('');
            }
            
            modal.style.display = 'block';
        }
        
        // 关闭备份模态框
        function closeBackupModal() {
            document.getElementById('backupModal').style.display = 'none';
        }
        
        // 加载备份配置
        async function loadBackup(index) {
            let history = JSON.parse(localStorage.getItem('config_backup_history') || '[]');
            const backup = history[index];
            
            showStatus('⏳ 正在加载配置...', 'info');
            
            try {
                // 从 GitHub 获取备份文件
                const response = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${backup.fileName}`, {
                    headers: { 'Authorization': 'token ' + githubToken }
                });
                
                if (!response.ok) {
                    throw new Error('备份文件不存在');
                }
                
                const data = await response.json();
                const configData = JSON.parse(atob(data.content));
                
                // 更新配置
                config = configData;
                localStorage.setItem('thunder_config', JSON.stringify(config));
                
                // 更新界面
                document.getElementById('speed').value = config.player.speed;
                document.getElementById('health').value = config.player.health;
                document.getElementById('damage').value = config.player.damage;
                document.getElementById('fireRate').value = config.player.fireRate;
                document.getElementById('spawnRate').value = config.enemies.spawnRate;
                document.getElementById('gravity').value = config.game.gravity;
                
                document.getElementById('current_speed').textContent = config.player.speed;
                document.getElementById('current_health').textContent = config.player.health;
                document.getElementById('current_damage').textContent = config.player.damage;
                document.getElementById('current_fireRate').textContent = config.player.fireRate;
                document.getElementById('current_spawnRate').textContent = config.enemies.spawnRate;
                document.getElementById('current_gravity').textContent = config.game.gravity;
                
                closeBackupModal();
                sendConfigToPreview();
                showStatus('✅ 配置已加载', 'success');
                
            } catch (error) {
                showStatus('❌ 加载失败：' + error.message, 'error');
            }
        }
        
        // 删除备份记录
        function deleteBackup(index) {
            if (!confirm('确定要删除这个备份记录吗？（仅删除记录，GitHub 文件保留）')) return;
            
            let history = JSON.parse(localStorage.getItem('config_backup_history') || '[]');
            history.splice(index, 1);
            localStorage.setItem('config_backup_history', JSON.stringify(history));
            
            showBackupList(); // 刷新列表
            showStatus('✅ 备份记录已删除', 'success');
        }
        
        // ========== 配置部署功能 ==========
        
        async function deployConfig() {
            if (!githubToken) {
                showStatus('❌ 请先保存 GitHub Token', 'error');
                alert('⚠️ 需要 GitHub Token\n\n请前往 GitHub 设置生成 Token');
                return;
            }
            
            showStatus('⏳ 正在部署配置...', 'info');
            
            try {
                // 部署配置文件
                const configBase64 = btoa(JSON.stringify(config, null, 2));
                await uploadToGitHub('config.json', configBase64, 'Update game config v' + config.version);
                
                // 部署图片资源
                for (const [type, fileData] of Object.entries(uploadedFiles)) {
                    let path = '';
                    if (type === 'player') path = 'player/classic.png';
                    if (type === 'slime') path = 'enemy/small.png';
                    if (type === 'mushroom') path = 'enemy/mushroom.png';
                    if (type === 'elite') path = 'enemy/elite.png';
                    if (type === 'boss') path = 'enemy/boss.png';
                    if (type === 'bg') path = 'bg/space.png';
                    
                    if (path) {
                        await uploadToGitHub(path, fileData.base64Content, 'Update ' + type + ' resource');
                    }
                }
                
                showStatus('✅ 部署成功！游戏将自动刷新', 'success');
                setTimeout(() => {
                    const gameFrame = document.getElementById('gamePreview');
                    if (gameFrame) {
                        gameFrame.src = gameFrame.src;
                    }
                    alert('✅ 部署成功！\n\n游戏已刷新，请查看效果');
                }, 2000);
                
            } catch (error) {
                showStatus('❌ 部署失败：' + error.message, 'error');
            }
        }
        
        async function uploadToGitHub(path, content, message) {
            const shaResponse = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${path}`, {
                headers: { 'Authorization': 'token ' + githubToken }
            });
            
            let sha = null;
            if (shaResponse.ok) {
                const data = await shaResponse.json();
                sha = data.sha;
            }
            
            const uploadData = { message: message, content: content };
            if (sha) uploadData.sha = sha;
            
            const response = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${path}`, {
                method: 'PUT',
                headers: {
                    'Authorization': 'token ' + githubToken,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(uploadData)
            });
            
            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.message);
            }
            
            return response;
        }
        
        function showStatus(message, type) {
            const statusBar = document.getElementById('statusBar');
            statusBar.textContent = message;
            statusBar.style.background = type === 'success' ? 'rgba(46, 204, 113, 0.9)' : 
                                         type === 'error' ? 'rgba(231, 76, 60, 0.9)' : 'rgba(52, 152, 219, 0.9)';
            statusBar.classList.add('show');
            setTimeout(() => statusBar.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>

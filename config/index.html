<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ 雷霆战机 - 配置系统 v2.1</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); 
            color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, 'Arial', sans-serif; 
            padding: 20px; 
            min-height: 100vh; 
        }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { text-align: center; color: #f39c12; margin-bottom: 30px; }
        
        .section {
            background: rgba(26, 26, 46, 0.9);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .section-title {
            color: #4ecdc4;
            font-size: 18px;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(78, 205, 196, 0.3);
            padding-bottom: 10px;
        }
        
        .slider-group {
            margin: 15px 0;
        }
        .slider-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            color: #95a5a6;
        }
        .slider-value {
            color: #f39c12;
            font-weight: bold;
        }
        input[type="range"] {
            width: 100%;
            height: 8px;
            border-radius: 4px;
            background: rgba(255,255,255,0.1);
            outline: none;
            -webkit-appearance: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #f39c12;
            cursor: pointer;
            -webkit-appearance: none;
        }
        
        .action-btn {
            background: linear-gradient(45deg, #f39c12, #e67e22);
            border: none;
            color: white;
            padding: 15px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            margin: 10px 5px;
            transition: transform 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .action-btn:active { transform: scale(0.95); }
        .action-btn.secondary {
            background: linear-gradient(45deg, #95a5a6, #7f8c8d);
        }
        .action-btn.success {
            background: linear-gradient(45deg, #27ae60, #2ecc71);
        }
        .action-btn.primary {
            background: linear-gradient(45deg, #3498db, #2980b9);
        }
        
        .preview-card {
            background: linear-gradient(135deg, rgba(52, 152, 219, 0.2), rgba(41, 128, 185, 0.2));
            border: 2px solid #3498db;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            margin: 20px 0;
        }
        .preview-card h3 {
            color: #3498db;
            margin-bottom: 15px;
        }
        .preview-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .preview-link {
            display: block;
            background: rgba(52, 152, 219, 0.2);
            border: 1px dashed #3498db;
            border-radius: 10px;
            padding: 15px;
            margin-top: 15px;
            color: #3498db;
            text-decoration: none;
            word-break: break-all;
        }
        .preview-link:active {
            background: rgba(52, 152, 219, 0.3);
        }
        
        .resource-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
        }
        .resource-card {
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
        }
        .resource-card h4 {
            color: #4ecdc4;
            margin-bottom: 10px;
            font-size: 13px;
        }
        .upload-btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 12px;
            margin: 5px;
        }
        
        .status-bar {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(46, 204, 113, 0.9);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            z-index: 1000;
            display: none;
        }
        .status-bar.show { display: block; }
        
        .token-box {
            background: rgba(243, 156, 18, 0.1);
            border: 2px solid #f39c12;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: center;
        }
        .token-input {
            background: rgba(0,0,0,0.5);
            border: 2px solid #f39c12;
            border-radius: 10px;
            padding: 12px 20px;
            color: #fff;
            font-size: 14px;
            width: 100%;
            max-width: 500px;
            margin: 10px 0;
        }
        
        @media (max-width: 600px) {
            .preview-buttons {
                flex-direction: column;
            }
            .action-btn {
                width: 100%;
            }
            .resource-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ 雷霆战机 - 配置系统 v2.1</h1>
        
        <div class="token-box">
            <h3>🔑 GitHub Token</h3>
            <input type="password" id="githubToken" class="token-input" placeholder="输入 GitHub Token (ghp_开头)">
            <br>
            <button class="action-btn" onclick="saveToken()">💾 保存 Token</button>
            <div id="tokenStatus" style="margin-top: 10px; font-size: 12px;"></div>
        </div>
        
        <!-- 预览游戏卡片 -->
        <div class="preview-card">
            <h3>🎮 预览游戏</h3>
            <p style="color: #95a5a6; margin-bottom: 15px;">配置完成后，打开游戏预览效果</p>
            <div class="preview-buttons">
                <a href="../index.html" target="_blank" class="action-btn primary">🔗 打开预览</a>
                <button class="action-btn success" onclick="copyGameLink()">📋 复制链接</button>
            </div>
            <a href="../index.html" target="_blank" class="preview-link" id="gameLink">
                🔗 https://guoguoxia5211.github.io/thunder-fighter-game/
            </a>
        </div>
        
        <!-- 数值配置 -->
        <div class="section">
            <h3 class="section-title">⚙️ 玩家数值</h3>
            <div class="slider-group">
                <div class="slider-label">
                    <span>速度</span>
                    <span class="slider-value" id="value_speed">5</span>
                </div>
                <input type="range" id="speed" min="1" max="10" value="5" oninput="updateValue('speed', this.value)">
            </div>
            <div class="slider-group">
                <div class="slider-label">
                    <span>跳跃力</span>
                    <span class="slider-value" id="value_jumpPower">-15</span>
                </div>
                <input type="range" id="jumpPower" min="-20" max="-5" value="-15" oninput="updateValue('jumpPower', this.value)">
            </div>
            <div class="slider-group">
                <div class="slider-label">
                    <span>血量</span>
                    <span class="slider-value" id="value_health">3</span>
                </div>
                <input type="range" id="health" min="1" max="10" value="3" oninput="updateValue('health', this.value)">
            </div>
            <div class="slider-group">
                <div class="slider-label">
                    <span>伤害</span>
                    <span class="slider-value" id="value_damage">1</span>
                </div>
                <input type="range" id="damage" min="1" max="10" value="1" oninput="updateValue('damage', this.value)">
            </div>
            <div class="slider-group">
                <div class="slider-label">
                    <span>射速</span>
                    <span class="slider-value" id="value_fireRate">1</span>
                </div>
                <input type="range" id="fireRate" min="1" max="10" value="1" oninput="updateValue('fireRate', this.value)">
            </div>
        </div>
        
        <div class="section">
            <h3 class="section-title">👾 敌人数值</h3>
            <div class="slider-group">
                <div class="slider-label">
                    <span>敌人生成频率</span>
                    <span class="slider-value" id="value_spawnRate">5</span>
                </div>
                <input type="range" id="spawnRate" min="1" max="10" value="5" oninput="updateValue('spawnRate', this.value)">
            </div>
            <div class="slider-group">
                <div class="slider-label">
                    <span>重力系数</span>
                    <span class="slider-value" id="value_gravity">0.8</span>
                </div>
                <input type="range" id="gravity" min="0.1" max="2.0" step="0.1" value="0.8" oninput="updateValue('gravity', this.value)">
            </div>
        </div>
        
        <!-- 美术资源 -->
        <div class="section">
            <h3 class="section-title">🎨 美术资源</h3>
            <div class="resource-grid">
                <div class="resource-card">
                    <h4>🎮 玩家飞机</h4>
                    <button class="upload-btn" onclick="uploadResource('player')">📤 上传</button>
                    <input type="file" id="upload_player" accept="image/*" style="display:none" onchange="handleFileSelect('player', event)">
                </div>
                <div class="resource-card">
                    <h4>👾 史莱姆</h4>
                    <button class="upload-btn" onclick="uploadResource('slime')">📤 上传</button>
                    <input type="file" id="upload_slime" accept="image/*" style="display:none" onchange="handleFileSelect('slime', event)">
                </div>
                <div class="resource-card">
                    <h4>🍄 蘑菇怪</h4>
                    <button class="upload-btn" onclick="uploadResource('mushroom')">📤 上传</button>
                    <input type="file" id="upload_mushroom" accept="image/*" style="display:none" onchange="handleFileSelect('mushroom', event)">
                </div>
                <div class="resource-card">
                    <h4>👹 精英怪</h4>
                    <button class="upload-btn" onclick="uploadResource('elite')">📤 上传</button>
                    <input type="file" id="upload_elite" accept="image/*" style="display:none" onchange="handleFileSelect('elite', event)">
                </div>
                <div class="resource-card">
                    <h4>🐲 Boss</h4>
                    <button class="upload-btn" onclick="uploadResource('boss')">📤 上传</button>
                    <input type="file" id="upload_boss" accept="image/*" style="display:none" onchange="handleFileSelect('boss', event)">
                </div>
                <div class="resource-card">
                    <h4>🌌 背景</h4>
                    <button class="upload-btn" onclick="uploadResource('bg')">📤 上传</button>
                    <input type="file" id="upload_bg" accept="image/*" style="display:none" onchange="handleFileSelect('bg', event)">
                </div>
            </div>
        </div>
        
        <div style="text-align: center; margin-top: 20px;">
            <button class="action-btn success" onclick="deployConfig()">🚀 部署配置</button>
            <button class="action-btn secondary" onclick="resetConfig()">🔄 重置默认</button>
        </div>
    </div>
    
    <div id="statusBar" class="status-bar"></div>
    
    <script>
        const GITHUB_REPO = 'guoguoxia5211/thunder-fighter-game';
        let githubToken = localStorage.getItem('github_token') || '';
        
        let config = {
            version: "2.1.0",
            player: { speed: 5, jumpPower: -15, health: 3, damage: 1, fireRate: 1 },
            enemies: { spawnRate: 5 },
            game: { gravity: 0.8 }
        };
        
        let uploadedFiles = {};
        
        window.onload = function() {
            if (githubToken) {
                document.getElementById('githubToken').value = githubToken;
                document.getElementById('tokenStatus').textContent = '✅ Token 已保存';
            }
        };
        
        function saveToken() {
            const token = document.getElementById('githubToken').value.trim();
            if (!token) { alert('请输入 Token'); return; }
            if (!token.startsWith('ghp_')) { alert('Token 格式错误'); return; }
            githubToken = token;
            localStorage.setItem('github_token', token);
            document.getElementById('tokenStatus').textContent = '✅ Token 已保存';
            showStatus('✅ Token 已保存！', 'success');
        }
        
        function updateValue(key, value) {
            document.getElementById('value_' + key).textContent = value;
            
            if (key === 'speed') config.player.speed = parseFloat(value);
            if (key === 'jumpPower') config.player.jumpPower = parseFloat(value);
            if (key === 'health') config.player.health = parseFloat(value);
            if (key === 'damage') config.player.damage = parseFloat(value);
            if (key === 'fireRate') config.player.fireRate = parseFloat(value);
            if (key === 'spawnRate') config.enemies.spawnRate = parseFloat(value);
            if (key === 'gravity') config.game.gravity = parseFloat(value);
        }
        
        function uploadResource(type) {
            document.getElementById('upload_' + type).click();
        }
        
        function handleFileSelect(type, event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                uploadedFiles[type] = {
                    file: file,
                    dataUrl: e.target.result,
                    base64Content: e.target.result.split(',')[1]
                };
                showStatus('✅ ' + file.name + ' 已上传，点击部署生效', 'success');
            };
            reader.readAsDataURL(file);
        }
        
        function copyGameLink() {
            const link = 'https://guoguoxia5211.github.io/thunder-fighter-game/';
            navigator.clipboard.writeText(link).then(() => {
                showStatus('📋 链接已复制！', 'success');
            }).catch(() => {
                showStatus('❌ 复制失败，请手动复制链接', 'error');
            });
        }
        
        async function deployConfig() {
            if (!githubToken) {
                showStatus('❌ 请先保存 GitHub Token', 'error');
                return;
            }
            
            if (Object.keys(uploadedFiles).length === 0 && !confirm('确定要部署当前数值配置吗？')) {
                return;
            }
            
            showStatus('⏳ 正在部署配置...', 'info');
            
            try {
                // 部署配置文件
                const configBase64 = btoa(JSON.stringify(config, null, 2));
                await uploadToGitHub('config.json', configBase64, 'Update game config v' + config.version);
                
                // 部署上传的资源
                for (const [type, fileData] of Object.entries(uploadedFiles)) {
                    let path = '';
                    if (type === 'player') path = 'player/classic.png';
                    if (type === 'slime') path = 'enemy/slime.png';
                    if (type === 'mushroom') path = 'enemy/mushroom.png';
                    if (type === 'elite') path = 'enemy/elite.png';
                    if (type === 'boss') path = 'enemy/boss.png';
                    if (type === 'bg') path = 'bg/space.png';
                    
                    if (path) {
                        await uploadToGitHub(path, fileData.base64Content, 'Update ' + type + ' resource');
                    }
                }
                
                showStatus('✅ 部署成功！请手动刷新游戏页面', 'success');
                alert('✅ 部署成功！\n\n请刷新游戏页面查看效果：\nhttps://guoguoxia5211.github.io/thunder-fighter-game/');
                
            } catch (error) {
                showStatus('❌ 部署失败：' + error.message, 'error');
            }
        }
        
        async function uploadToGitHub(path, content, message) {
            // 获取当前 sha
            const shaResponse = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${path}`, {
                headers: { 'Authorization': 'token ' + githubToken }
            });
            
            let sha = null;
            if (shaResponse.ok) {
                const data = await shaResponse.json();
                sha = data.sha;
            }
            
            // 上传文件
            const uploadData = {
                message: message,
                content: content
            };
            if (sha) {
                uploadData.sha = sha;
            }
            
            const response = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${path}`, {
                method: 'PUT',
                headers: {
                    'Authorization': 'token ' + githubToken,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(uploadData)
            });
            
            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.message);
            }
            
            return response;
        }
        
        function resetConfig() {
            if (confirm('确定要重置为默认配置吗？')) {
                config = {
                    version: "2.1.0",
                    player: { speed: 5, jumpPower: -15, health: 3, damage: 1, fireRate: 1 },
                    enemies: { spawnRate: 5 },
                    game: { gravity: 0.8 }
                };
                
                document.getElementById('speed').value = 5;
                document.getElementById('jumpPower').value = -15;
                document.getElementById('health').value = 3;
                document.getElementById('damage').value = 1;
                document.getElementById('fireRate').value = 1;
                document.getElementById('spawnRate').value = 5;
                document.getElementById('gravity').value = 0.8;
                
                document.getElementById('value_speed').textContent = '5';
                document.getElementById('value_jumpPower').textContent = '-15';
                document.getElementById('value_health').textContent = '3';
                document.getElementById('value_damage').textContent = '1';
                document.getElementById('value_fireRate').textContent = '1';
                document.getElementById('value_spawnRate').textContent = '5';
                document.getElementById('value_gravity').textContent = '0.8';
                
                showStatus('✅ 配置已重置为默认值', 'success');
            }
        }
        
        function showStatus(message, type) {
            const statusBar = document.getElementById('statusBar');
            statusBar.textContent = message;
            statusBar.style.background = type === 'success' ? 'rgba(46, 204, 113, 0.9)' : 
                                         type === 'error' ? 'rgba(231, 76, 60, 0.9)' : 'rgba(52, 152, 219, 0.9)';
            statusBar.classList.add('show');
            setTimeout(() => statusBar.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>

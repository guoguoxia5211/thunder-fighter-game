<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ 雷霆战机 - 配置系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); color: #fff; font-family: Arial, sans-serif; padding: 20px; }
        .slider-group { margin: 20px 0; }
        .slider-label { display: flex; justify-content: space-between; margin-bottom: 10px; }
        input[type="range"] { width: 100%; }
        .value-display { color: #f39c12; font-weight: bold; }
        button { background: #2ecc71; color: white; border: none; padding: 15px 30px; border-radius: 10px; cursor: pointer; font-size: 16px; margin-top: 20px; }
        button:hover { background: #27ae60; }
        #status { position: fixed; top: 20px; right: 20px; background: rgba(46, 204, 113, 0.9); color: white; padding: 15px 25px; border-radius: 10px; display: none; }
    </style>
</head>
<body>
    <div id="status"></div>
    
    <h1>⚡ 雷霆战机 - 配置系统</h1>
    <p style="margin: 20px 0; color: #95a5a6;">修改数值后会自动保存，刷新页面不会丢失！</p>
    
    <div class="slider-group">
        <div class="slider-label">
            <span>玩家速度</span>
            <span class="value-display" id="speedValue">5</span>
        </div>
        <input type="range" id="speed" min="1" max="10" value="5" oninput="updateConfig()">
    </div>
    
    <div class="slider-group">
        <div class="slider-label">
            <span>玩家血量</span>
            <span class="value-display" id="healthValue">3</span>
        </div>
        <input type="range" id="health" min="1" max="10" value="3" oninput="updateConfig()">
    </div>
    
    <div class="slider-group">
        <div class="slider-label">
            <span>玩家伤害</span>
            <span class="value-display" id="damageValue">1</span>
        </div>
        <input type="range" id="damage" min="1" max="10" value="1" oninput="updateConfig()">
    </div>
    
    <div class="slider-group">
        <div class="slider-label">
            <span>玩家射速</span>
            <span class="value-display" id="fireRateValue">1</span>
        </div>
        <input type="range" id="fireRate" min="1" max="10" value="1" oninput="updateConfig()">
    </div>
    
    <div class="slider-group">
        <div class="slider-label">
            <span>敌人生成</span>
            <span class="value-display" id="spawnRateValue">5</span>
        </div>
        <input type="range" id="spawnRate" min="1" max="10" value="5" oninput="updateConfig()">
    </div>
    
    <div class="slider-group">
        <div class="slider-label">
            <span>重力系数</span>
            <span class="value-display" id="gravityValue">0.8</span>
        </div>
        <input type="range" id="gravity" min="0.1" max="2.0" step="0.1" value="0.8" oninput="updateConfig()">
    </div>
    
    <button onclick="testSave()">💾 测试保存</button>
    <button onclick="testLoad()" style="background: #3498db; margin-left: 10px;">📥 测试加载</button>
    <button onclick="clearStorage()" style="background: #e74c3c; margin-left: 10px;">🗑️ 清除缓存</button>
    
    <script>
        // 页面加载时加载配置
        window.addEventListener('DOMContentLoaded', function() {
            console.log('页面加载完成');
            loadConfig();
        });
        
        function getConfig() {
            const saved = localStorage.getItem('thunder_config');
            console.log('读取 localStorage:', saved);
            
            if (saved) {
                try {
                    const config = JSON.parse(saved);
                    console.log('解析成功:', config);
                    return config;
                } catch (e) {
                    console.error('解析失败:', e);
                }
            }
            
            // 默认配置
            console.log('使用默认配置');
            return {
                player: { speed: 5, health: 3, damage: 1, fireRate: 1 },
                enemies: { spawnRate: 5 },
                game: { gravity: 0.8 }
            };
        }
        
        function loadConfig() {
            const config = getConfig();
            
            // 更新滑块的值
            document.getElementById('speed').value = config.player.speed;
            document.getElementById('health').value = config.player.health;
            document.getElementById('damage').value = config.player.damage;
            document.getElementById('fireRate').value = config.player.fireRate;
            document.getElementById('spawnRate').value = config.enemies.spawnRate;
            document.getElementById('gravity').value = config.game.gravity;
            
            // 更新显示值
            document.getElementById('speedValue').textContent = config.player.speed;
            document.getElementById('healthValue').textContent = config.player.health;
            document.getElementById('damageValue').textContent = config.player.damage;
            document.getElementById('fireRateValue').textContent = config.player.fireRate;
            document.getElementById('spawnRateValue').textContent = config.enemies.spawnRate;
            document.getElementById('gravityValue').textContent = config.game.gravity;
            
            console.log('配置已加载到界面');
            showStatus('✅ 配置已加载');
        }
        
        function updateConfig() {
            const config = {
                player: {
                    speed: parseFloat(document.getElementById('speed').value),
                    health: parseFloat(document.getElementById('health').value),
                    damage: parseFloat(document.getElementById('damage').value),
                    fireRate: parseFloat(document.getElementById('fireRate').value)
                },
                enemies: {
                    spawnRate: parseFloat(document.getElementById('spawnRate').value)
                },
                game: {
                    gravity: parseFloat(document.getElementById('gravity').value)
                }
            };
            
            // 更新显示值
            document.getElementById('speedValue').textContent = config.player.speed;
            document.getElementById('healthValue').textContent = config.player.health;
            document.getElementById('damageValue').textContent = config.player.damage;
            document.getElementById('fireRateValue').textContent = config.player.fireRate;
            document.getElementById('spawnRateValue').textContent = config.enemies.spawnRate;
            document.getElementById('gravityValue').textContent = config.game.gravity;
            
            // 保存到 localStorage
            localStorage.setItem('thunder_config', JSON.stringify(config));
            console.log('配置已保存:', config);
            
            showStatus('✅ 已自动保存');
        }
        
        function testSave() {
            const config = {
                player: { speed: 10, health: 10, damage: 10, fireRate: 10 },
                enemies: { spawnRate: 10 },
                game: { gravity: 2.0 }
            };
            localStorage.setItem('thunder_config', JSON.stringify(config));
            console.log('测试保存:', config);
            showStatus('✅ 测试数据已保存 (血量=10)');
        }
        
        function testLoad() {
            loadConfig();
        }
        
        function clearStorage() {
            localStorage.removeItem('thunder_config');
            console.log('缓存已清除');
            showStatus('🗑️ 缓存已清除，请刷新页面');
        }
        
        function showStatus(message) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.style.display = 'block';
            setTimeout(() => { status.style.display = 'none'; }, 2000);
        }
    </script>
</body>
</html>

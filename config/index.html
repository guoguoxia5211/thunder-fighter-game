<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎨 雷霆战机 - 美术替换系统 v3.0.4</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); color: #fff; font-family: 'Arial', sans-serif; padding: 20px; min-height: 100vh; }
        h1 { text-align: center; color: #00d2ff; margin-bottom: 10px; font-size: 36px; }
        .subtitle { text-align: center; color: #3a7bd5; margin-bottom: 30px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .token-box { background: rgba(243, 156, 18, 0.1); border: 2px solid #f39c12; border-radius: 15px; padding: 20px; margin-bottom: 30px; text-align: center; }
        .token-box h3 { color: #f39c12; margin-bottom: 15px; }
        .token-input { background: rgba(0,0,0,0.5); border: 2px solid #f39c12; border-radius: 10px; padding: 12px 20px; color: #fff; font-size: 14px; width: 100%; max-width: 500px; margin-bottom: 10px; }
        .token-btn { background: linear-gradient(45deg, #f39c12, #e67e22); border: none; color: white; padding: 12px 30px; border-radius: 25px; cursor: pointer; font-weight: bold; margin: 5px; }
        .token-status { margin-top: 10px; font-size: 12px; }
        .token-status.valid { color: #2ecc71; }
        .resource-item { background: rgba(26, 26, 46, 0.9); border: 2px solid rgba(255, 255, 255, 0.1); border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        .resource-title { color: #00d2ff; font-size: 18px; margin-bottom: 15px; border-bottom: 1px solid rgba(0, 210, 255, 0.3); padding-bottom: 10px; }
        .preview-container { display: grid; grid-template-columns: 1fr auto 1fr; gap: 20px; align-items: center; }
        .preview-box { text-align: center; }
        .preview-label { font-size: 14px; color: #95a5a6; margin-bottom: 10px; }
        .preview-img { width: 120px; height: 120px; background: rgba(0,0,0,0.5); border-radius: 10px; border: 2px solid rgba(255,255,255,0.1); object-fit: contain; }
        .arrow { font-size: 40px; color: #f39c12; }
        .upload-area { border: 2px dashed rgba(0, 210, 255, 0.5); border-radius: 10px; padding: 20px; text-align: center; cursor: pointer; min-height: 180px; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: all 0.3s; }
        .upload-area:hover { border-color: #00d2ff; background: rgba(0, 210, 255, 0.1); }
        .upload-area.uploading { border-color: #f39c12; background: rgba(243, 156, 18, 0.1); }
        .upload-area.uploaded { border-color: #2ecc71; background: rgba(46, 204, 113, 0.1); }
        .upload-area input { display: none; }
        .upload-preview { width: 100px; height: 100px; margin: 10px auto; background: rgba(0,0,0,0.3); border-radius: 8px; display: none; object-fit: contain; }
        .upload-status { margin-top: 15px; font-size: 13px; min-height: 40px; }
        .deploy-btn { background: linear-gradient(45deg, #f39c12, #e67e22); border: none; color: white; padding: 12px 30px; border-radius: 25px; cursor: pointer; font-weight: bold; margin-top: 15px; width: 100%; font-size: 14px; }
        .deploy-btn:disabled { background: #95a5a6; cursor: not-allowed; }
        .deploy-btn.deployed { background: linear-gradient(45deg, #27ae60, #2ecc71); }
        .game-link { background: linear-gradient(45deg, #9b59b6, #8e44ad); border: none; color: white; padding: 15px 30px; border-radius: 30px; cursor: pointer; font-weight: bold; margin: 20px auto; display: block; text-decoration: none; text-align: center; }
        .toast { position: fixed; top: 80px; right: 20px; background: rgba(46, 204, 113, 0.95); color: white; padding: 15px 25px; border-radius: 10px; z-index: 1000; transform: translateX(400px); transition: transform 0.3s; }
        .toast.show { transform: translateX(0); }
        .toast.error { background: rgba(231, 76, 60, 0.95); }
        .help-box { background: rgba(52, 152, 219, 0.1); border: 2px solid #3498db; border-radius: 15px; padding: 20px; margin-bottom: 30px; }
        .help-box h3 { color: #3498db; margin-bottom: 10px; }
        .help-box p { color: #ecf0f1; line-height: 1.8; }
        .loading { text-align: center; padding: 40px; color: #95a5a6; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 雷霆战机 - 美术替换系统 v3.0.4</h1>
        <p class="subtitle">与游戏美术实时同步</p>
        <a href="https://guoguoxia5211.github.io/thunder-fighter-game/" target="_blank" class="game-link">🎮 打开游戏验证</a>
        <div class="token-box">
            <h3>🔑 GitHub Token</h3>
            <input type="password" id="githubToken" class="token-input" placeholder="输入 Token (ghp_开头)">
            <br>
            <button class="token-btn" onclick="saveToken()">💾 保存</button>
            <button class="token-btn" onclick="testToken()">🧪 测试</button>
            <div id="tokenStatus" class="token-status"></div>
        </div>
        <div class="help-box">
            <h3>📌 使用说明</h3>
            <p>1. 保存 Token → 2. 上传图片 (自动重命名) → 3. 点击部署 → 4. 等待 1-2 分钟 → 5. 刷新游戏</p>
        </div>
        <div id="resourcesContainer"><div class="loading">正在加载游戏美术资源...</div></div>
    </div>
    <div class="toast" id="toast"></div>
    <script>
        const GITHUB_REPO = 'guoguoxia5211/thunder-fighter-game';
        const GITHUB_BASE_URL = 'https://raw.githubusercontent.com/guoguoxia5211/thunder-fighter-game/main/';
        let githubToken = localStorage.getItem('github_token') || '';
        let uploadedFiles = {};
        let fileShas = {};
        const RESOURCES = [
            { id: 'player_classic', name: '✈️ 玩家飞机 - 经典款', path: 'player/classic.png', category: 'player' },
            { id: 'player_elite', name: '✈️ 玩家飞机 - 精英款', path: 'player/elite.png', category: 'player' },
            { id: 'enemy_small', name: '👾 敌机 - 小型', path: 'enemy/small.png', category: 'enemy' },
            { id: 'enemy_medium', name: '👾 敌机 - 中型', path: 'enemy/medium.png', category: 'enemy' },
            { id: 'enemy_large', name: '👾 敌机 - 大型', path: 'enemy/large.png', category: 'enemy' },
            { id: 'enemy_elite', name: '👾 敌机 - 精英', path: 'enemy/elite.png', category: 'enemy' },
            { id: 'enemy_boss', name: '👾 Boss 敌机', path: 'enemy/boss.png', category: 'enemy' },
            { id: 'bullet_player', name: '💫 玩家子弹', path: 'bullet/player.png', category: 'bullet' },
            { id: 'bullet_enemy', name: '💫 敌机子弹', path: 'bullet/enemy.png', category: 'bullet' },
            { id: 'explosion_small', name: '💥 小型爆炸', path: 'explosion/small.png', category: 'explosion' },
            { id: 'explosion_large', name: '💥 大型爆炸', path: 'explosion/large.png', category: 'explosion' },
            { id: 'ui_healthbar', name: '🎯 UI - 血条', path: 'ui/healthbar.png', category: 'ui' },
            { id: 'ui_coin', name: '🎯 UI - 金币', path: 'ui/coin.png', category: 'ui' },
            { id: 'ui_button', name: '🎯 UI - 按钮', path: 'ui/button.png', category: 'ui' },
            { id: 'bg_space', name: '🌌 背景 - 太空', path: 'bg/space.png', category: 'bg' },
            { id: 'bg_stars', name: '🌌 背景 - 星星', path: 'bg/stars.png', category: 'bg' }
        ];
        window.onload = async function() {
            if (githubToken) {
                document.getElementById('githubToken').value = githubToken;
                document.getElementById('tokenStatus').textContent = '✅ Token 已保存';
                document.getElementById('tokenStatus').classList.add('valid');
                await loadFileShas();
            }
            await renderResources();
        };
        async function loadFileShas() {
            for (const res of RESOURCES) {
                try {
                    const response = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${res.path}`, {
                        headers: { 'Authorization': `token ${githubToken}` }
                    });
                    if (response.ok) {
                        const data = await response.json();
                        fileShas[res.path] = data.sha;
                    }
                } catch (e) { console.log('Failed to load sha for', res.path); }
            }
        }
        function saveToken() {
            const token = document.getElementById('githubToken').value.trim();
            if (!token) { showToast('❌ 请输入 Token', 'error'); return; }
            if (!token.startsWith('ghp_')) { showToast('❌ Token 格式错误', 'error'); return; }
            githubToken = token;
            localStorage.setItem('github_token', token);
            document.getElementById('tokenStatus').textContent = '✅ Token 已保存';
            document.getElementById('tokenStatus').classList.add('valid');
            showToast('✅ Token 已保存', 'success');
        }
        function testToken() {
            if (!githubToken) { showToast('❌ 请先保存 Token', 'error'); return; }
            fetch(`https://api.github.com/repos/${GITHUB_REPO}`, { headers: { 'Authorization': `token ${githubToken}` } })
            .then(r => r.ok ? showToast('✅ Token 有效', 'success') : showToast('❌ Token 无效', 'error'))
            .catch(() => showToast('❌ 无法连接 GitHub', 'error'));
        }
        async function renderResources() {
            const container = document.getElementById('resourcesContainer');
            container.innerHTML = '';
            const categories = {};
            RESOURCES.forEach(res => {
                if (!categories[res.category]) {
                    categories[res.category] = [];
                }
                categories[res.category].push(res);
            });
            for (const [category, resources] of Object.entries(categories)) {
                const categoryDiv = document.createElement('div');
                categoryDiv.className = 'resource-item';
                categoryDiv.innerHTML = `<h3 class="resource-title">${category.toUpperCase()}</h3>`;
                const gridDiv = document.createElement('div');
                gridDiv.className = 'preview-container';
                gridDiv.style.display = 'grid';
                gridDiv.style.gridTemplateColumns = 'repeat(auto-fit, minmax(300px, 1fr))';
                gridDiv.style.gap = '20px';
                for (const res of resources) {
                    const resDiv = document.createElement('div');
                    resDiv.style.background = 'rgba(0,0,0,0.3)';
                    resDiv.style.borderRadius = '10px';
                    resDiv.style.padding = '15px';
                    resDiv.innerHTML = `
                        <div style="text-align:center;margin-bottom:10px;font-weight:bold;color:#00d2ff;">${res.name}</div>
                        <div style="display:flex;gap:10px;align-items:center;justify-content:center;">
                            <div style="text-align:center;">
                                <div style="font-size:11px;color:#95a5a6;margin-bottom:5px;">📌 当前资源</div>
                                <img class="preview-img" src="${GITHUB_BASE_URL}${res.path}?t=${Date.now()}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22120%22 height=%22120%22><rect fill=%22%23333%22 width=%22120%22 height=%22120%22/><text fill=%22%23999%22 x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22>加载中</text></svg>'" alt="${res.path}" style="min-height:120px;">
                                <div style="margin-top:5px;font-size:10px;color:#95a5a6;">${res.path}</div>
                            </div>
                            <div class="arrow">➜</div>
                            <div style="text-align:center;">
                                <div class="preview-label">📤 上传替换</div>
                                <div class="upload-area" id="upload_area_${res.id}">
                                    📁 点击上传<br>
                                    <span style="font-size:10px;color:#95a5a6;">自动命名为：${res.path.split('/').pop()}</span>
                                    <img class="upload-preview" id="preview_${res.id}" alt="">
                                    <input type="file" id="upload_${res.id}" accept="image/*" onchange="handleUpload('${res.id}', this, '${res.path}')">
                                </div>
                                <div class="upload-status" id="status_${res.id}"></div>
                            </div>
                        </div>
                        <button class="deploy-btn" id="deploy_btn_${res.id}" onclick="deployResource('${res.id}')" disabled style="margin-top:10px;">🚀 替换并部署</button>
                    `;
                    gridDiv.appendChild(resDiv);
                    document.getElementById(`upload_area_${res.id}`).onclick = function(e) {
                        if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'IMG') {
                            document.getElementById(`upload_${res.id}`).click();
                        }
                    };
                }
                categoryDiv.appendChild(gridDiv);
                container.appendChild(categoryDiv);
            }
        }
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast show ' + (type === 'error' ? 'error' : '');
            setTimeout(() => toast.classList.remove('show'), 4000);
        }
        function handleUpload(id, input, targetPath) {
            const uploadArea = document.getElementById(`upload_area_${id}`);
            const previewImg = document.getElementById(`preview_${id}`);
            const statusDiv = document.getElementById(`status_${id}`);
            const deployBtn = document.getElementById(`deploy_btn_${id}`);
            if (!input.files || !input.files[0]) { showToast('❌ 未选择文件', 'error'); return; }
            const file = input.files[0];
            const validTypes = ['image/png', 'image/jpeg', 'image/jpg', 'image/webp', 'image/gif'];
            if (!validTypes.includes(file.type)) { showToast(`❌ 不支持的格式：${file.type}`, 'error'); return; }
            if (file.size > 10 * 1024 * 1024) { showToast('❌ 文件过大，最大 10MB', 'error'); return; }
            uploadArea.classList.add('uploading');
            statusDiv.innerHTML = '<span style="color:#f39c12;">⏳ 上传中...</span>';
            const reader = new FileReader();
            reader.onload = function(e) {
                const base64Data = e.target.result;
                uploadedFiles[id] = {
                    dataUrl: base64Data,
                    base64Content: base64Data.split(',')[1],
                    originalName: file.name,
                    targetPath: targetPath,
                    targetName: targetPath.split('/').pop(),
                    fileType: file.type,
                    fileSize: file.size
                };
                previewImg.src = base64Data;
                previewImg.style.display = 'block';
                uploadArea.classList.remove('uploading');
                uploadArea.classList.add('uploaded');
                uploadArea.innerHTML = `✅ 已上传<br><span style="font-size:11px;">${file.name}</span>`;
                uploadArea.appendChild(previewImg);
                statusDiv.innerHTML = '<span style="color:#2ecc71;">✅ 可以部署</span>';
                deployBtn.disabled = false;
                document.getElementById(`upload_area_${id}`).onclick = function(e) {
                    if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'IMG') {
                        document.getElementById(`upload_${id}`).click();
                    }
                };
                showToast(`✅ 上传成功！将保存为 ${targetPath.split('/').pop()}`, 'success');
            };
            reader.onerror = function() {
                uploadArea.classList.remove('uploading');
                statusDiv.innerHTML = '<span style="color:#e74c3c;">❌ 文件读取失败</span>';
                showToast('❌ 文件读取失败', 'error');
            };
            reader.readAsDataURL(file);
        }
        async function deployResource(id) {
            if (!githubToken) { showToast('❌ 请先保存 Token', 'error'); return; }
            if (!uploadedFiles[id]) { showToast('❌ 请先上传图片', 'error'); return; }
            const res = RESOURCES.find(r => r.id === id);
            const file = uploadedFiles[id];
            const deployBtn = document.getElementById(`deploy_btn_${id}`);
            deployBtn.disabled = true;
            deployBtn.textContent = '⏳ 获取文件信息...';
            try {
                let fileSha = fileShas[file.targetPath];
                if (!fileSha) {
                    const response = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${file.targetPath}`, {
                        headers: { 'Authorization': `token ${githubToken}` }
                    });
                    if (response.ok) {
                        const data = await response.json();
                        fileSha = data.sha;
                        fileShas[file.targetPath] = fileSha;
                    }
                }
                deployBtn.textContent = '⏳ 部署中...';
                const response = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${file.targetPath}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${githubToken}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        message: `Update ${res.name} v3.0.4`, 
                        content: file.base64Content,
                        sha: fileSha
                    })
                });
                if (!response.ok) { const err = await response.json(); throw new Error(`GitHub API ${response.status}: ${err.message}`); }
                deployBtn.disabled = true;
                deployBtn.textContent = '✅ 已部署';
                deployBtn.classList.add('deployed');
                showToast(`✅ ${res.name} 已部署！等待 1-2 分钟刷新游戏`, 'success');
            } catch (error) {
                deployBtn.disabled = false;
                deployBtn.textContent = '🚀 替换并部署';
                showToast(`❌ 部署失败：${error.message}`, 'error');
            }
        }
    </script>
</body>
</html>

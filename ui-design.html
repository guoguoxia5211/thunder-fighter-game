<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>雷霆战机 - UI 设计工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #0a0a1a;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 顶部标签 */
        .tabs {
            display: flex;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            font-size: 14px;
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            transition: all 0.3s;
            border-bottom: 2px solid transparent;
        }

        .tab.active {
            color: #00d4ff;
            border-bottom-color: #00d4ff;
            font-weight: 600;
        }

        /* 预览区 */
        .preview-area {
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        #preview {
            width: 375px;
            height: 667px;
            background: linear-gradient(180deg, #1a1a3e 0%, #0a0a1a 100%);
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
            overflow: hidden;
            position: relative;
        }

        /* 游戏标题区 */
        .game-title {
            text-align: center;
            padding: 60px 20px 40px;
        }

        .game-logo {
            font-size: 42px;
            font-weight: 900;
            background: linear-gradient(135deg, #00d4ff 0%, #0099ff 50%, #ff0066 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0,212,255,0.5);
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .game-subtitle {
            font-size: 14px;
            color: rgba(255,255,255,0.5);
            letter-spacing: 4px;
        }

        /* 菜单区 */
        .menu-section {
            padding: 20px 30px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .menu-btn {
            width: 100%;
            padding: 18px 24px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            position: relative;
            overflow: hidden;
        }

        .menu-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .menu-btn:hover::before {
            left: 100%;
        }

        .btn-start {
            background: linear-gradient(135deg, #00d4ff 0%, #0099ff 100%);
            color: #fff;
            box-shadow: 0 4px 20px rgba(0,212,255,0.4);
        }

        .btn-skin {
            background: linear-gradient(135deg, #ff6b6b 0%, #ff8e53 100%);
            color: #fff;
            box-shadow: 0 4px 20px rgba(255,107,107,0.4);
        }

        .btn-achievement {
            background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
            color: #fff;
            box-shadow: 0 4px 20px rgba(161,140,209,0.4);
        }

        .btn-settings {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* 底部信息 */
        .footer-info {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 11px;
            color: rgba(255,255,255,0.3);
        }

        .player-level {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            margin-bottom: 8px;
        }

        /* 控制面板 */
        .control-panel {
            background: #1a1a2e;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 16px;
            max-height: calc(100vh - 400px);
            overflow-y: auto;
            color: #fff;
        }

        .panel-section {
            margin-bottom: 24px;
        }

        .panel-section h3 {
            font-size: 14px;
            font-weight: 600;
            color: #00d4ff;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .control-row {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }

        .control-item {
            flex: 1;
        }

        .control-item label {
            display: block;
            font-size: 12px;
            color: rgba(255,255,255,0.6);
            margin-bottom: 6px;
        }

        .control-item input[type="text"],
        .control-item input[type="number"],
        .control-item select {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            font-size: 13px;
            background: rgba(255,255,255,0.05);
            color: #fff;
        }

        .control-item input[type="color"] {
            width: 100%;
            height: 40px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            padding: 2px;
            cursor: pointer;
        }

        .control-item input[type="range"] {
            width: 100%;
            height: 6px;
            -webkit-appearance: none;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            outline: none;
        }

        .control-item input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: #00d4ff;
            border-radius: 50%;
            cursor: pointer;
        }

        .value-display {
            text-align: right;
            font-size: 11px;
            color: rgba(255,255,255,0.4);
            margin-top: 4px;
        }

        /* 渐变预设 */
        .gradient-presets {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-top: 10px;
        }

        .gradient-preset {
            height: 40px;
            border-radius: 6px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }

        .gradient-preset:hover {
            transform: scale(1.05);
        }

        .gradient-preset.selected {
            border-color: #00d4ff;
            box-shadow: 0 2px 8px rgba(0,212,255,0.4);
        }

        /* 底部操作栏 */
        .action-bar {
            position: sticky;
            bottom: 0;
            display: flex;
            background: #1a1a2e;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 12px 16px;
            gap: 12px;
            z-index: 200;
        }

        .action-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }

        .action-btn.primary {
            background: linear-gradient(135deg, #00d4ff 0%, #0099ff 100%);
            color: #fff;
        }

        .action-btn.secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* 隐藏面板 */
        .panel-content {
            display: none;
        }

        .panel-content.active {
            display: block;
        }

        /* 背景星星动画 */
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(255,255,255,0.8);
            border-radius: 50%;
            animation: twinkle 2s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <!-- 顶部标签 -->
    <div class="tabs">
        <div class="tab active" onclick="switchPanel('content')">📝 内容</div>
        <div class="tab" onclick="switchPanel('style')">🎨 样式</div>
        <div class="tab" onclick="switchPanel('effect')">✨ 特效</div>
    </div>

    <!-- 预览区 -->
    <div class="preview-area">
        <div id="preview">
            <!-- 星星背景 -->
            <div class="stars" id="stars"></div>

            <!-- 游戏标题 -->
            <div class="game-title">
                <div class="game-logo" id="gameLogo">雷霆战机</div>
                <div class="game-subtitle" id="gameSubtitle">THUNDER FIGHTER</div>
            </div>

            <!-- 菜单区 -->
            <div class="menu-section">
                <button class="menu-btn btn-start" id="btnStart">
                    <span>🚀</span>
                    <span id="btnStartText">开始游戏</span>
                </button>
                <button class="menu-btn btn-skin" id="btnSkin">
                    <span>👕</span>
                    <span id="btnSkinText">皮肤系统</span>
                </button>
                <button class="menu-btn btn-achievement" id="btnAchieve">
                    <span>🏆</span>
                    <span id="btnAchieveText">成就系统</span>
                </button>
                <button class="menu-btn btn-settings" id="btnSettings">
                    <span>⚙️</span>
                    <span id="btnSettingsText">设置</span>
                </button>
            </div>

            <!-- 底部信息 -->
            <div class="footer-info">
                <div class="player-level">Lv.99 王牌飞行员</div>
                <div id="versionInfo">Version 1.0.0</div>
            </div>
        </div>
    </div>

    <!-- 控制面板 -->
    <div class="control-panel">
        <!-- 内容面板 -->
        <div id="panel-content" class="panel-content active">
            <div class="panel-section">
                <h3>🎮 游戏标题</h3>
                <div class="control-item">
                    <label>主标题</label>
                    <input type="text" id="logoInput" value="雷霆战机" oninput="update()">
                </div>
                <div class="control-item">
                    <label>副标题</label>
                    <input type="text" id="subtitleInput" value="THUNDER FIGHTER" oninput="update()">
                </div>
            </div>

            <div class="panel-section">
                <h3>🔘 按钮文字</h3>
                <div class="control-item">
                    <label>开始游戏</label>
                    <input type="text" value="开始游戏" oninput="update()">
                </div>
                <div class="control-item">
                    <label>皮肤系统</label>
                    <input type="text" value="皮肤系统" oninput="update()">
                </div>
                <div class="control-item">
                    <label>成就系统</label>
                    <input type="text" value="成就系统" oninput="update()">
                </div>
                <div class="control-item">
                    <label>设置</label>
                    <input type="text" value="设置" oninput="update()">
                </div>
            </div>

            <div class="panel-section">
                <h3>📊 底部信息</h3>
                <div class="control-item">
                    <label>玩家等级</label>
                    <input type="text" value="Lv.99 王牌飞行员" oninput="update()">
                </div>
                <div class="control-item">
                    <label>版本号</label>
                    <input type="text" value="Version 1.0.0" oninput="update()">
                </div>
            </div>
        </div>

        <!-- 样式面板 -->
        <div id="panel-style" class="panel-content">
            <div class="panel-section">
                <h3>🎨 标题样式</h3>
                <div class="control-row">
                    <div class="control-item">
                        <label>大小</label>
                        <input type="range" min="30" max="60" value="42" oninput="updateLogoStyle()">
                        <div class="value-display" id="logoSizeVal">42px</div>
                    </div>
                </div>
            </div>

            <div class="panel-section">
                <h3>🚀 开始按钮</h3>
                <div class="control-row">
                    <div class="control-item">
                        <label>颜色 1</label>
                        <input type="color" id="btn1Color1" value="#00d4ff" oninput="updateBtn1Style()">
                    </div>
                    <div class="control-item">
                        <label>颜色 2</label>
                        <input type="color" id="btn1Color2" value="#0099ff" oninput="updateBtn1Style()">
                    </div>
                </div>
                <div class="control-item">
                    <label>圆角</label>
                    <input type="range" min="0" max="30" value="12" oninput="updateBtn1Style()">
                    <div class="value-display" id="btn1RadiusVal">12px</div>
                </div>
            </div>

            <div class="panel-section">
                <h3>👕 皮肤按钮</h3>
                <div class="control-row">
                    <div class="control-item">
                        <label>颜色 1</label>
                        <input type="color" id="btn2Color1" value="#ff6b6b" oninput="updateBtn2Style()">
                    </div>
                    <div class="control-item">
                        <label>颜色 2</label>
                        <input type="color" id="btn2Color2" value="#ff8e53" oninput="updateBtn2Style()">
                    </div>
                </div>
                <div class="control-item">
                    <label>圆角</label>
                    <input type="range" min="0" max="30" value="12" oninput="updateBtn2Style()">
                    <div class="value-display" id="btn2RadiusVal">12px</div>
                </div>
            </div>

            <div class="panel-section">
                <h3>🏆 成就按钮</h3>
                <div class="control-row">
                    <div class="control-item">
                        <label>颜色 1</label>
                        <input type="color" id="btn3Color1" value="#a18cd1" oninput="updateBtn3Style()">
                    </div>
                    <div class="control-item">
                        <label>颜色 2</label>
                        <input type="color" id="btn3Color2" value="#fbc2eb" oninput="updateBtn3Style()">
                    </div>
                </div>
                <div class="control-item">
                    <label>圆角</label>
                    <input type="range" min="0" max="30" value="12" oninput="updateBtn3Style()">
                    <div class="value-display" id="btn3RadiusVal">12px</div>
                </div>
            </div>

            <div class="panel-section">
                <h3>⚙️ 设置按钮</h3>
                <div class="control-row">
                    <div class="control-item">
                        <label>背景</label>
                        <input type="color" id="btn4Bg" value="#ffffff" style="opacity:0.1" oninput="updateBtn4Style()">
                    </div>
                    <div class="control-item">
                        <label>边框</label>
                        <input type="color" id="btn4Border" value="#ffffff" oninput="updateBtn4Style()">
                    </div>
                </div>
            </div>

            <div class="panel-section">
                <h3>🌌 背景</h3>
                <div class="control-row">
                    <div class="control-item">
                        <label>颜色 1</label>
                        <input type="color" id="bgColor1" value="#1a1a3e" oninput="updateBgStyle()">
                    </div>
                    <div class="control-item">
                        <label>颜色 2</label>
                        <input type="color" id="bgColor2" value="#0a0a1a" oninput="updateBgStyle()">
                    </div>
                </div>
            </div>
        </div>

        <!-- 特效面板 -->
        <div id="panel-effect" class="panel-content">
            <div class="panel-section">
                <h3>🌈 标题渐变预设</h3>
                <div class="gradient-presets">
                    <div class="gradient-preset" style="background: linear-gradient(135deg, #00d4ff 0%, #0099ff 50%, #ff0066 100%)" onclick="applyTitleGradient(this)"></div>
                    <div class="gradient-preset" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%)" onclick="applyTitleGradient(this)"></div>
                    <div class="gradient-preset" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)" onclick="applyTitleGradient(this)"></div>
                    <div class="gradient-preset" style="background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)" onclick="applyTitleGradient(this)"></div>
                    <div class="gradient-preset" style="background: linear-gradient(135deg, #fa709a 0%, #fee140 100%)" onclick="applyTitleGradient(this)"></div>
                    <div class="gradient-preset" style="background: linear-gradient(135deg, #30cfd0 0%, #330867 100%)" onclick="applyTitleGradient(this)"></div>
                    <div class="gradient-preset" style="background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%)" onclick="applyTitleGradient(this)"></div>
                    <div class="gradient-preset" style="background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%)" onclick="applyTitleGradient(this)"></div>
                </div>
            </div>

            <div class="panel-section">
                <h3>✨ 按钮阴影</h3>
                <div class="control-item">
                    <label>强度</label>
                    <input type="range" min="0" max="40" value="20" oninput="updateShadow()">
                    <div class="value-display" id="shadowVal">20px</div>
                </div>
            </div>

            <div class="panel-section">
                <h3>⭐ 星星背景</h3>
                <div class="control-item">
                    <label>星星数量</label>
                    <input type="range" min="0" max="100" value="50" oninput="updateStars()">
                    <div class="value-display" id="starsVal">50 颗</div>
                </div>
            </div>

            <div class="panel-section">
                <h3>📐 间距</h3>
                <div class="control-item">
                    <label>标题上边距</label>
                    <input type="range" min="20" max="100" value="60" oninput="updatePadding()">
                    <div class="value-display" id="paddingVal">60px</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 底部操作栏 -->
    <div class="action-bar">
        <button class="action-btn secondary" onclick="resetDesign()">🔄 重置</button>
        <button class="action-btn primary" onclick="exportDesign()">💾 导出</button>
    </div>

    <script>
        // 创建星星
        function createStars(count) {
            const container = document.getElementById('stars');
            container.innerHTML = '';
            for (let i = 0; i < count; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 2 + 's';
                container.appendChild(star);
            }
        }

        // 切换面板
        function switchPanel(name) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.panel-content').forEach(p => p.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('panel-' + name).classList.add('active');
        }

        // 更新文字
        function update() {
            document.getElementById('gameLogo').textContent = document.getElementById('logoInput').value;
            document.getElementById('gameSubtitle').textContent = document.getElementById('subtitleInput').value;
            
            const inputs = document.querySelectorAll('.control-panel input[type="text"]');
            const btns = ['btnStartText', 'btnSkinText', 'btnAchieveText', 'btnSettingsText'];
            inputs.forEach((input, index) => {
                if (index >= 2 && index <= 5) {
                    document.getElementById(btns[index - 2]).textContent = input.value;
                }
            });
        }

        // 更新标题样式
        function updateLogoStyle() {
            const size = event.target.value;
            document.getElementById('gameLogo').style.fontSize = size + 'px';
            document.getElementById('logoSizeVal').textContent = size + 'px';
        }

        // 更新按钮 1 样式
        function updateBtn1Style() {
            const btn = document.getElementById('btnStart');
            const c1 = document.getElementById('btn1Color1').value;
            const c2 = document.getElementById('btn1Color2').value;
            const radius = event.target.value;
            
            btn.style.background = `linear-gradient(135deg, ${c1} 0%, ${c2} 100%)`;
            btn.style.borderRadius = radius + 'px';
            document.getElementById('btn1RadiusVal').textContent = radius + 'px';
        }

        // 更新按钮 2 样式
        function updateBtn2Style() {
            const btn = document.getElementById('btnSkin');
            const c1 = document.getElementById('btn2Color1').value;
            const c2 = document.getElementById('btn2Color2').value;
            const radius = event.target.value;
            
            btn.style.background = `linear-gradient(135deg, ${c1} 0%, ${c2} 100%)`;
            btn.style.borderRadius = radius + 'px';
            document.getElementById('btn2RadiusVal').textContent = radius + 'px';
        }

        // 更新按钮 3 样式
        function updateBtn3Style() {
            const btn = document.getElementById('btnAchieve');
            const c1 = document.getElementById('btn3Color1').value;
            const c2 = document.getElementById('btn3Color2').value;
            const radius = event.target.value;
            
            btn.style.background = `linear-gradient(135deg, ${c1} 0%, ${c2} 100%)`;
            btn.style.borderRadius = radius + 'px';
            document.getElementById('btn3RadiusVal').textContent = radius + 'px';
        }

        // 更新按钮 4 样式
        function updateBtn4Style() {
            const btn = document.getElementById('btnSettings');
            const bg = document.getElementById('btn4Bg').value;
            const border = document.getElementById('btn4Border').value;
            
            btn.style.background = bg + '1a';
            btn.style.borderColor = border + '33';
        }

        // 更新背景样式
        function updateBgStyle() {
            const c1 = document.getElementById('bgColor1').value;
            const c2 = document.getElementById('bgColor2').value;
            document.getElementById('preview').style.background = `linear-gradient(180deg, ${c1} 0%, ${c2} 100%)`;
        }

        // 应用标题渐变
        function applyTitleGradient(el) {
            document.querySelectorAll('.gradient-preset').forEach(p => p.classList.remove('selected'));
            el.classList.add('selected');
            
            const bg = getComputedStyle(el).background;
            document.getElementById('gameLogo').style.background = bg;
            document.getElementById('gameLogo').style.webkitBackgroundClip = 'text';
        }

        // 更新阴影
        function updateShadow() {
            const value = event.target.value;
            const btns = document.querySelectorAll('.menu-btn');
            btns.forEach(btn => {
                btn.style.boxShadow = `0 4px ${value}px rgba(0,0,0,0.3)`;
            });
            document.getElementById('shadowVal').textContent = value + 'px';
        }

        // 更新星星
        function updateStars() {
            const value = event.target.value;
            createStars(value);
            document.getElementById('starsVal').textContent = value + '颗';
        }

        // 更新间距
        function updatePadding() {
            const value = event.target.value;
            document.querySelector('.game-title').style.padding = `${value}px 20px 40px`;
            document.getElementById('paddingVal').textContent = value + 'px';
        }

        // 重置
        function resetDesign() {
            if (confirm('确定要重置所有设置吗？')) {
                location.reload();
            }
        }

        // 导出
        function exportDesign() {
            const design = {
                logo: document.getElementById('gameLogo').textContent,
                subtitle: document.getElementById('gameSubtitle').textContent,
                buttons: [
                    document.getElementById('btnStartText').textContent,
                    document.getElementById('btnSkinText').textContent,
                    document.getElementById('btnAchieveText').textContent,
                    document.getElementById('btnSettingsText').textContent
                ]
            };
            
            const blob = new Blob([JSON.stringify(design, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'thunder-fighter-ui.json';
            a.click();
            URL.revokeObjectURL(url);
        }

        // 初始化
        createStars(50);
        update();
    </script>
</body>
</html>

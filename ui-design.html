<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>雷霆战机 - UI 配置工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #0a0a1a;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 顶部标题栏 */
        .header {
            background: linear-gradient(135deg, #1a1a3e 0%, #0a0a1a 100%);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0,212,255,0.3);
        }

        .header h1 {
            font-size: 18px;
            color: #00d4ff;
            font-weight: 600;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .header-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
        }

        .header-btn.primary {
            background: linear-gradient(135deg, #00d4ff 0%, #0099ff 100%);
            color: #fff;
        }

        .header-btn.secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* 主容器 */
        .main-container {
            display: flex;
            height: calc(100vh - 60px);
        }

        /* 左侧预览区 */
        .preview-section {
            width: 375px;
            background: #0f0f1f;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            border-right: 1px solid rgba(255,255,255,0.1);
            overflow-y: auto;
        }

        #preview {
            width: 100%;
            height: 667px;
            background: linear-gradient(180deg, #1a1a3e 0%, #0a0a1a 100%);
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
            overflow: hidden;
            position: relative;
        }

        /* 右侧配置区 */
        .config-section {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        /* 配置面板 */
        .config-panel {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            margin-bottom: 16px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .config-header {
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            background: rgba(255,255,255,0.03);
            transition: background 0.3s;
        }

        .config-header:hover {
            background: rgba(255,255,255,0.08);
        }

        .config-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 15px;
            font-weight: 600;
            color: #fff;
        }

        .config-icon {
            font-size: 18px;
        }

        .toggle-icon {
            font-size: 18px;
            color: rgba(255,255,255,0.5);
            transition: transform 0.3s;
        }

        .config-panel.active .toggle-icon {
            transform: rotate(90deg);
        }

        .config-content {
            display: none;
            padding: 20px;
        }

        .config-panel.active .config-content {
            display: block;
        }

        /* 配置子项 */
        .config-subsection {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .config-subsection:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .config-subsection h4 {
            font-size: 13px;
            color: #00d4ff;
            margin-bottom: 12px;
            font-weight: 600;
        }

        /* 控制项 */
        .control-row {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }

        .control-item {
            flex: 1;
        }

        .control-item label {
            display: block;
            font-size: 12px;
            color: rgba(255,255,255,0.6);
            margin-bottom: 6px;
        }

        .control-item input[type="text"],
        .control-item input[type="number"],
        .control-item select {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            font-size: 13px;
            background: rgba(255,255,255,0.05);
            color: #fff;
        }

        .control-item input[type="color"] {
            width: 100%;
            height: 40px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            padding: 2px;
            cursor: pointer;
        }

        .control-item input[type="range"] {
            width: 100%;
            height: 6px;
            -webkit-appearance: none;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            outline: none;
        }

        .control-item input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: #00d4ff;
            border-radius: 50%;
            cursor: pointer;
        }

        .value-display {
            text-align: right;
            font-size: 11px;
            color: rgba(255,255,255,0.4);
            margin-top: 4px;
        }

        /* 渐变预设 */
        .gradient-presets {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-top: 10px;
        }

        .gradient-preset {
            height: 40px;
            border-radius: 6px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }

        .gradient-preset:hover {
            transform: scale(1.05);
        }

        .gradient-preset.selected {
            border-color: #00d4ff;
            box-shadow: 0 2px 8px rgba(0,212,255,0.4);
        }

        /* 开关 */
        .switch-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
        }

        .switch-label {
            font-size: 13px;
            color: rgba(255,255,255,0.8);
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(255,255,255,0.2);
            transition: .3s;
            border-radius: 26px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #00d4ff;
        }

        input:checked + .slider:before {
            transform: translateX(24px);
        }

        /* 游戏标题区 */
        .game-title {
            text-align: center;
            padding: 60px 20px 40px;
        }

        .game-logo {
            font-size: 42px;
            font-weight: 900;
            background: linear-gradient(135deg, #00d4ff 0%, #0099ff 50%, #ff0066 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0,212,255,0.5);
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .game-subtitle {
            font-size: 14px;
            color: rgba(255,255,255,0.5);
            letter-spacing: 4px;
        }

        /* 菜单区 */
        .menu-section {
            padding: 20px 30px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .menu-btn {
            width: 100%;
            padding: 18px 24px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            position: relative;
            overflow: hidden;
        }

        .btn-start {
            background: linear-gradient(135deg, #00d4ff 0%, #0099ff 100%);
            color: #fff;
            box-shadow: 0 4px 20px rgba(0,212,255,0.4);
        }

        .btn-skin {
            background: linear-gradient(135deg, #ff6b6b 0%, #ff8e53 100%);
            color: #fff;
            box-shadow: 0 4px 20px rgba(255,107,107,0.4);
        }

        .btn-achievement {
            background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
            color: #fff;
            box-shadow: 0 4px 20px rgba(161,140,209,0.4);
        }

        .btn-settings {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* 底部信息 */
        .footer-info {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 11px;
            color: rgba(255,255,255,0.3);
        }

        .player-level {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            margin-bottom: 8px;
        }

        /* 星星背景 */
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(255,255,255,0.8);
            border-radius: 50%;
            animation: twinkle 2s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* 开场动画 */
        @keyframes slideInDown {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes glow {
            0%, 100% {
                box-shadow: 0 4px 20px rgba(0,212,255,0.4);
            }
            50% {
                box-shadow: 0 4px 30px rgba(0,212,255,0.6), 0 0 40px rgba(0,212,255,0.3);
            }
        }

        @keyframes shimmer {
            0% {
                background-position: -1000px 0;
            }
            100% {
                background-position: 1000px 0;
            }
        }

        @keyframes rippleEffect {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        /* 按钮点击动画 */
        @keyframes buttonPress {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(0.95);
            }
            100% {
                transform: scale(1);
            }
        }

        /* 应用动画 */
        .game-title {
            animation: slideInDown 0.8s cubic-bezier(0.4, 0, 0.2, 1) 0.2s both;
        }

        .game-logo {
            animation: scaleIn 0.8s cubic-bezier(0.4, 0, 0.2, 1) 0.4s both;
        }

        .menu-btn {
            opacity: 0;
            animation: slideInUp 0.6s cubic-bezier(0.4, 0, 0.2, 1) both;
        }

        .menu-btn:nth-child(1) { animation-delay: 0.6s; }
        .menu-btn:nth-child(2) { animation-delay: 0.7s; }
        .menu-btn:nth-child(3) { animation-delay: 0.8s; }
        .menu-btn:nth-child(4) { animation-delay: 0.9s; }

        .footer-info {
            animation: fadeIn 1s ease-out 1.2s both;
        }

        /* 按钮悬停效果 */
        .menu-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .menu-btn:hover {
            transform: translateY(-3px) scale(1.02);
        }

        .btn-start:hover {
            box-shadow: 0 6px 30px rgba(0,212,255,0.6), 0 0 40px rgba(0,212,255,0.3);
            animation: glow 2s ease-in-out infinite;
        }

        .btn-skin:hover {
            box-shadow: 0 6px 30px rgba(255,107,107,0.6), 0 0 40px rgba(255,107,107,0.3);
        }

        .btn-achievement:hover {
            box-shadow: 0 6px 30px rgba(161,140,209,0.6), 0 0 40px rgba(161,140,209,0.3);
        }

        .btn-settings:hover {
            background: rgba(255,255,255,0.15);
            transform: translateY(-2px);
        }

        /* 按钮点击效果 */
        .menu-btn:active {
            transform: translateY(-1px) scale(0.98);
            animation: buttonPress 0.2s ease-out;
        }

        /* 光泽扫过效果 */
        .menu-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255,255,255,0.3),
                transparent
            );
            transition: left 0.6s ease;
        }

        .menu-btn:hover::after {
            left: 100%;
        }

        /* 标题光晕 */
        .game-logo {
            position: relative;
        }

        .game-logo::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120%;
            height: 120%;
            background: radial-gradient(
                circle,
                rgba(0,212,255,0.1) 0%,
                transparent 70%
            );
            animation: glow 3s ease-in-out infinite;
            z-index: -1;
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>
    <!-- 顶部标题栏 -->
    <div class="header">
        <h1>🎮 雷霆战机 - UI 配置工具</h1>
        <div class="header-actions">
            <button class="header-btn secondary" onclick="resetDesign()">🔄 重置</button>
            <button class="header-btn primary" onclick="exportDesign()">💾 导出</button>
        </div>
    </div>

    <!-- 主容器 -->
    <div class="main-container">
        <!-- 左侧预览区 -->
        <div class="preview-section">
            <div id="preview">
                <div class="stars" id="stars"></div>

                <div class="game-title">
                    <div class="game-logo" id="gameLogo">雷霆战机</div>
                    <div class="game-subtitle" id="gameSubtitle">THUNDER FIGHTER</div>
                </div>

                <div class="menu-section">
                    <button class="menu-btn btn-start" id="btnStart" onclick="handleClick(this)">
                        <span>🚀</span>
                        <span id="btnStartText">开始游戏</span>
                    </button>
                    <button class="menu-btn btn-skin" id="btnSkin" onclick="handleClick(this)">
                        <span>👕</span>
                        <span id="btnSkinText">皮肤系统</span>
                    </button>
                    <button class="menu-btn btn-achievement" id="btnAchieve" onclick="handleClick(this)">
                        <span>🏆</span>
                        <span id="btnAchieveText">成就系统</span>
                    </button>
                    <button class="menu-btn btn-settings" id="btnSettings" onclick="handleClick(this)">
                        <span>⚙️</span>
                        <span id="btnSettingsText">设置</span>
                    </button>
                </div>

                <div class="footer-info">
                    <div class="player-level" id="playerLevel">Lv.99 王牌飞行员</div>
                    <div id="versionInfo">Version 1.0.0</div>
                </div>
            </div>
        </div>

        <!-- 右侧配置区 -->
        <div class="config-section">
            <!-- 美术配置 -->
            <div class="config-panel active" onclick="togglePanel(this)">
                <div class="config-header">
                    <div class="config-title">
                        <span class="config-icon">🎨</span>
                        <span>美术配置</span>
                    </div>
                    <span class="toggle-icon">▶</span>
                </div>
                <div class="config-content">
                    <!-- 标题样式 -->
                    <div class="config-subsection">
                        <h4>标题样式</h4>
                        <div class="control-item">
                            <label>标题大小</label>
                            <input type="range" min="30" max="60" value="42" oninput="updateLogoStyle()">
                            <div class="value-display" id="logoSizeVal">42px</div>
                        </div>
                        <div class="gradient-presets">
                            <div class="gradient-preset" style="background: linear-gradient(135deg, #00d4ff 0%, #0099ff 50%, #ff0066 100%)" onclick="applyTitleGradient(this)"></div>
                            <div class="gradient-preset" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%)" onclick="applyTitleGradient(this)"></div>
                            <div class="gradient-preset" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)" onclick="applyTitleGradient(this)"></div>
                            <div class="gradient-preset" style="background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)" onclick="applyTitleGradient(this)"></div>
                            <div class="gradient-preset" style="background: linear-gradient(135deg, #fa709a 0%, #fee140 100%)" onclick="applyTitleGradient(this)"></div>
                            <div class="gradient-preset" style="background: linear-gradient(135deg, #30cfd0 0%, #330867 100%)" onclick="applyTitleGradient(this)"></div>
                            <div class="gradient-preset" style="background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%)" onclick="applyTitleGradient(this)"></div>
                            <div class="gradient-preset" style="background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%)" onclick="applyTitleGradient(this)"></div>
                        </div>
                    </div>

                    <!-- 背景特效 -->
                    <div class="config-subsection">
                        <h4>背景特效</h4>
                        <div class="control-row">
                            <div class="control-item">
                                <label>背景色 1</label>
                                <input type="color" id="bgColor1" value="#1a1a3e" oninput="updateBgStyle()">
                            </div>
                            <div class="control-item">
                                <label>背景色 2</label>
                                <input type="color" id="bgColor2" value="#0a0a1a" oninput="updateBgStyle()">
                            </div>
                        </div>
                        <div class="control-item">
                            <label>星星数量</label>
                            <input type="range" min="0" max="100" value="50" oninput="updateStars()">
                            <div class="value-display" id="starsVal">50 颗</div>
                        </div>
                    </div>

                    <!-- 按钮样式 -->
                    <div class="config-subsection">
                        <h4>按钮样式</h4>
                        <div class="control-item">
                            <label>开始按钮渐变</label>
                            <div class="control-row">
                                <div class="control-item">
                                    <input type="color" id="btn1Color1" value="#00d4ff" oninput="updateBtn1Style()">
                                </div>
                                <div class="control-item">
                                    <input type="color" id="btn1Color2" value="#0099ff" oninput="updateBtn1Style()">
                                </div>
                            </div>
                            <label style="margin-top:8px">圆角</label>
                            <input type="range" min="0" max="30" value="12" oninput="updateBtn1Style()">
                            <div class="value-display" id="btn1RadiusVal">12px</div>
                        </div>
                        <div class="control-item" style="margin-top:12px">
                            <label>皮肤按钮渐变</label>
                            <div class="control-row">
                                <div class="control-item">
                                    <input type="color" id="btn2Color1" value="#ff6b6b" oninput="updateBtn2Style()">
                                </div>
                                <div class="control-item">
                                    <input type="color" id="btn2Color2" value="#ff8e53" oninput="updateBtn2Style()">
                                </div>
                            </div>
                            <label style="margin-top:8px">圆角</label>
                            <input type="range" min="0" max="30" value="12" oninput="updateBtn2Style()">
                            <div class="value-display" id="btn2RadiusVal">12px</div>
                        </div>
                        <div class="control-item" style="margin-top:12px">
                            <label>成就按钮渐变</label>
                            <div class="control-row">
                                <div class="control-item">
                                    <input type="color" id="btn3Color1" value="#a18cd1" oninput="updateBtn3Style()">
                                </div>
                                <div class="control-item">
                                    <input type="color" id="btn3Color2" value="#fbc2eb" oninput="updateBtn3Style()">
                                </div>
                            </div>
                            <label style="margin-top:8px">圆角</label>
                            <input type="range" min="0" max="30" value="12" oninput="updateBtn3Style()">
                            <div class="value-display" id="btn3RadiusVal">12px</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 游戏配置 -->
            <div class="config-panel" onclick="togglePanel(this)">
                <div class="config-header">
                    <div class="config-title">
                        <span class="config-icon">⚙️</span>
                        <span>游戏配置</span>
                    </div>
                    <span class="toggle-icon">▶</span>
                </div>
                <div class="config-content">
                    <!-- 文字内容 -->
                    <div class="config-subsection">
                        <h4>文字内容</h4>
                        <div class="control-item">
                            <label>游戏标题</label>
                            <input type="text" id="logoInput" value="雷霆战机" oninput="update()">
                        </div>
                        <div class="control-item">
                            <label>副标题</label>
                            <input type="text" id="subtitleInput" value="THUNDER FIGHTER" oninput="update()">
                        </div>
                        <div class="control-item">
                            <label>开始按钮</label>
                            <input type="text" value="开始游戏" oninput="update()">
                        </div>
                        <div class="control-item">
                            <label>皮肤按钮</label>
                            <input type="text" value="皮肤系统" oninput="update()">
                        </div>
                        <div class="control-item">
                            <label>成就按钮</label>
                            <input type="text" value="成就系统" oninput="update()">
                        </div>
                        <div class="control-item">
                            <label>设置按钮</label>
                            <input type="text" value="设置" oninput="update()">
                        </div>
                    </div>

                    <!-- 玩家信息 -->
                    <div class="config-subsection">
                        <h4>玩家信息</h4>
                        <div class="control-item">
                            <label>玩家等级显示</label>
                            <input type="text" value="Lv.99 王牌飞行员" oninput="update()">
                        </div>
                        <div class="control-item">
                            <label>版本号</label>
                            <input type="text" value="Version 1.0.0" oninput="update()">
                        </div>
                    </div>

                    <!-- 布局设置 -->
                    <div class="config-subsection">
                        <h4>布局设置</h4>
                        <div class="control-item">
                            <label>标题上边距</label>
                            <input type="range" min="20" max="100" value="60" oninput="updatePadding()">
                            <div class="value-display" id="paddingVal">60px</div>
                        </div>
                        <div class="switch-row">
                            <span class="switch-label">显示星星背景</span>
                            <label class="switch">
                                <input type="checkbox" checked onchange="toggleStarsDisplay(this.checked)">
                                <span class="slider"></span>
                            </label>
                        </div>
                        <div class="switch-row">
                            <span class="switch-label">显示玩家信息</span>
                            <label class="switch">
                                <input type="checkbox" checked onchange="toggleFooterDisplay(this.checked)">
                                <span class="slider"></span>
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 特效配置 -->
            <div class="config-panel" onclick="togglePanel(this)">
                <div class="config-header">
                    <div class="config-title">
                        <span class="config-icon">✨</span>
                        <span>特效配置</span>
                    </div>
                    <span class="toggle-icon">▶</span>
                </div>
                <div class="config-content">
                    <div class="config-subsection">
                        <h4>阴影效果</h4>
                        <div class="control-item">
                            <label>按钮阴影强度</label>
                            <input type="range" min="0" max="40" value="20" oninput="updateShadow()">
                            <div class="value-display" id="shadowVal">20px</div>
                        </div>
                    </div>

                    <div class="config-subsection">
                        <h4>动画效果</h4>
                        <div class="switch-row">
                            <span class="switch-label">按钮悬停动画</span>
                            <label class="switch">
                                <input type="checkbox" checked>
                                <span class="slider"></span>
                            </label>
                        </div>
                        <div class="switch-row">
                            <span class="switch-label">星星闪烁动画</span>
                            <label class="switch">
                                <input type="checkbox" checked>
                                <span class="slider"></span>
                            </label>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 创建星星
        function createStars(count) {
            const container = document.getElementById('stars');
            container.innerHTML = '';
            for (let i = 0; i < count; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 2 + 's';
                container.appendChild(star);
            }
        }

        // 切换面板
        function togglePanel(panel) {
            panel.classList.toggle('active');
        }

        // 按钮点击效果
        function handleClick(btn) {
            // 创建涟漪
            const ripple = document.createElement('span');
            ripple.style.cssText = `
                position: absolute;
                background: rgba(255,255,255,0.6);
                border-radius: 50%;
                transform: scale(0);
                animation: rippleEffect 0.6s ease-out;
                pointer-events: none;
            `;
            
            const rect = btn.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const y = event.clientY - rect.top;
            const size = Math.max(rect.width, rect.height);
            
            ripple.style.width = ripple.style.height = size + 'px';
            ripple.style.left = (x - size/2) + 'px';
            ripple.style.top = (y - size/2) + 'px';
            
            btn.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
            
            // 添加点击样式
            btn.style.transform = 'scale(0.95)';
            setTimeout(() => {
                btn.style.transform = '';
            }, 150);
        }

        // 更新文字
        function update() {
            document.getElementById('gameLogo').textContent = document.getElementById('logoInput').value;
            document.getElementById('gameSubtitle').textContent = document.getElementById('subtitleInput').value;
            
            const inputs = document.querySelectorAll('.config-section input[type="text"]');
            const btns = ['btnStartText', 'btnSkinText', 'btnAchieveText', 'btnSettingsText'];
            inputs.forEach((input, index) => {
                if (index >= 2 && index <= 5) {
                    document.getElementById(btns[index - 2]).textContent = input.value;
                }
            });
        }

        // 更新标题样式
        function updateLogoStyle() {
            const size = event.target.value;
            document.getElementById('gameLogo').style.fontSize = size + 'px';
            document.getElementById('logoSizeVal').textContent = size + 'px';
        }

        // 应用标题渐变
        function applyTitleGradient(el) {
            document.querySelectorAll('.gradient-preset').forEach(p => p.classList.remove('selected'));
            el.classList.add('selected');
            
            const bg = getComputedStyle(el).background;
            document.getElementById('gameLogo').style.background = bg;
            document.getElementById('gameLogo').style.webkitBackgroundClip = 'text';
        }

        // 更新背景样式
        function updateBgStyle() {
            const c1 = document.getElementById('bgColor1').value;
            const c2 = document.getElementById('bgColor2').value;
            document.getElementById('preview').style.background = `linear-gradient(180deg, ${c1} 0%, ${c2} 100%)`;
        }

        // 更新星星
        function updateStars() {
            const value = event.target.value;
            createStars(value);
            document.getElementById('starsVal').textContent = value + '颗';
        }

        // 切换星星显示
        function toggleStarsDisplay(show) {
            document.getElementById('stars').style.display = show ? 'block' : 'none';
        }

        // 切换底部显示
        function toggleFooterDisplay(show) {
            document.querySelector('.footer-info').style.display = show ? 'block' : 'none';
        }

        // 更新按钮 1 样式
        function updateBtn1Style() {
            const btn = document.getElementById('btnStart');
            const c1 = document.getElementById('btn1Color1').value;
            const c2 = document.getElementById('btn1Color2').value;
            const radius = event.target.value;
            
            btn.style.background = `linear-gradient(135deg, ${c1} 0%, ${c2} 100%)`;
            btn.style.borderRadius = radius + 'px';
            document.getElementById('btn1RadiusVal').textContent = radius + 'px';
        }

        // 更新按钮 2 样式
        function updateBtn2Style() {
            const btn = document.getElementById('btnSkin');
            const c1 = document.getElementById('btn2Color1').value;
            const c2 = document.getElementById('btn2Color2').value;
            const radius = event.target.value;
            
            btn.style.background = `linear-gradient(135deg, ${c1} 0%, ${c2} 100%)`;
            btn.style.borderRadius = radius + 'px';
            document.getElementById('btn2RadiusVal').textContent = radius + 'px';
        }

        // 更新按钮 3 样式
        function updateBtn3Style() {
            const btn = document.getElementById('btnAchieve');
            const c1 = document.getElementById('btn3Color1').value;
            const c2 = document.getElementById('btn3Color2').value;
            const radius = event.target.value;
            
            btn.style.background = `linear-gradient(135deg, ${c1} 0%, ${c2} 100%)`;
            btn.style.borderRadius = radius + 'px';
            document.getElementById('btn3RadiusVal').textContent = radius + 'px';
        }

        // 更新阴影
        function updateShadow() {
            const value = event.target.value;
            const btns = document.querySelectorAll('.menu-btn');
            btns.forEach(btn => {
                btn.style.boxShadow = `0 4px ${value}px rgba(0,0,0,0.3)`;
            });
            document.getElementById('shadowVal').textContent = value + 'px';
        }

        // 更新间距
        function updatePadding() {
            const value = event.target.value;
            document.querySelector('.game-title').style.padding = `${value}px 20px 40px`;
            document.getElementById('paddingVal').textContent = value + 'px';
        }

        // 重置
        function resetDesign() {
            if (confirm('确定要重置所有设置吗？')) {
                location.reload();
            }
        }

        // 导出
        function exportDesign() {
            const design = {
                logo: document.getElementById('gameLogo').textContent,
                subtitle: document.getElementById('gameSubtitle').textContent,
                buttons: [
                    document.getElementById('btnStartText').textContent,
                    document.getElementById('btnSkinText').textContent,
                    document.getElementById('btnAchieveText').textContent,
                    document.getElementById('btnSettingsText').textContent
                ]
            };
            
            const blob = new Blob([JSON.stringify(design, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'thunder-fighter-ui.json';
            a.click();
            URL.revokeObjectURL(url);
        }

        // 初始化
        createStars(50);
        update();
    </script>
</body>
</html>

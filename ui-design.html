<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>雷霆战机 - UI 美术设计工具</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            overflow: hidden;
        }
        .header {
            background: rgba(15, 12, 41, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0,212,255,0.2);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            height: 55px;
        }
        .header h1 {
            font-size: 16px;
            background: linear-gradient(135deg, #00d4ff 0%, #0099ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }
        .header-actions { display: flex; gap: 8px; }
        .header-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .header-btn.primary { background: linear-gradient(135deg, #00d4ff 0%, #0099ff 100%); color: #fff; box-shadow: 0 4px 15px rgba(0,212,255,0.3); }
        .header-btn.primary:hover { transform: translateY(-2px); }
        .header-btn.secondary { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); }
        .header-btn.secondary:hover { background: rgba(255,255,255,0.15); }
        .main-container { display: flex; height: 100vh; padding-top: 55px; }
        .preview-section {
            width: 35%;
            min-width: 260px;
            max-width: 380px;
            background: rgba(15, 12, 41, 0.5);
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            border-right: 1px solid rgba(255,255,255,0.08);
            overflow-y: auto;
        }
        #preview {
            width: 100%;
            max-width: 260px;
            height: 460px;
            background: linear-gradient(180deg, #1a1a3e 0%, #0a0a1a 100%);
            border-radius: 16px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5), 0 0 30px rgba(0,212,255,0.1);
            overflow: hidden;
            position: relative;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .config-section { flex: 1; overflow-y: auto; padding: 15px; background: rgba(26, 26, 62, 0.3); }
        .config-panel {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 12px;
            margin-bottom: 12px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.3s;
        }
        .config-panel.active { background: rgba(255,255,255,0.05); border-color: rgba(0,212,255,0.2); }
        .config-header {
            padding: 14px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: background 0.3s;
        }
        .config-header:hover { background: rgba(255,255,255,0.05); }
        .config-title { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; color: #fff; }
        .config-icon { font-size: 16px; }
        .toggle-icon { font-size: 16px; color: rgba(255,255,255,0.4); transition: transform 0.3s; }
        .config-panel.active .toggle-icon { transform: rotate(90deg); color: #00d4ff; }
        .config-content { display: none; padding: 16px; }
        .config-panel.active .config-content { display: block; }
        .config-subsection { margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,0.06); }
        .config-subsection:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
        .config-subsection h4 { font-size: 12px; color: #00d4ff; margin-bottom: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .control-row { display: flex; gap: 8px; margin-bottom: 12px; }
        .control-item { flex: 1; }
        .control-item label { display: block; font-size: 11px; color: rgba(255,255,255,0.6); margin-bottom: 4px; font-weight: 500; }
        .control-item input[type="text"], .control-item input[type="number"] {
            width: 100%; padding: 8px 10px; border: 1px solid rgba(255,255,255,0.15); border-radius: 6px; font-size: 13px; background: rgba(255,255,255,0.05); color: #fff; transition: all 0.3s;
        }
        .control-item input:focus { outline: none; border-color: #00d4ff; background: rgba(255,255,255,0.08); }
        .control-item input[type="color"] { width: 100%; height: 36px; border: 1px solid rgba(255,255,255,0.15); border-radius: 6px; padding: 2px; cursor: pointer; background: rgba(255,255,255,0.05); }
        .control-item input[type="range"] { width: 100%; height: 6px; -webkit-appearance: none; background: rgba(255,255,255,0.1); border-radius: 3px; cursor: pointer; }
        .control-item input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 18px; height: 18px; background: linear-gradient(135deg, #00d4ff 0%, #0099ff 100%); border-radius: 50%; cursor: pointer; box-shadow: 0 2px 10px rgba(0,212,255,0.4); transition: all 0.3s;
        }
        .control-item input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); box-shadow: 0 4px 15px rgba(0,212,255,0.6); }
        .control-item select { width: 100%; padding: 8px 10px; border: 1px solid rgba(255,255,255,0.15); border-radius: 6px; font-size: 13px; background: rgba(255,255,255,0.05); color: #fff; }
        .value-display { text-align: right; font-size: 10px; color: rgba(0,212,255,0.8); margin-top: 4px; font-weight: 600; }
        .gradient-presets, .texture-presets { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 8px; }
        .gradient-preset, .texture-preset {
            height: 40px; border-radius: 8px; cursor: pointer; border: 2px solid transparent; transition: all 0.3s; box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .gradient-preset:hover, .texture-preset:hover { transform: scale(1.08); }
        .gradient-preset.selected, .texture-preset.selected { border-color: #00d4ff; box-shadow: 0 0 15px rgba(0,212,255,0.4); transform: scale(1.1); }
        .texture-preset { background-size: cover; background-position: center; }
        .theme-presets { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .theme-preset { padding: 12px; border-radius: 10px; cursor: pointer; border: 2px solid transparent; text-align: center; font-size: 12px; font-weight: 600; color: #fff; transition: all 0.3s; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        .theme-preset:hover { transform: scale(1.05); }
        .theme-preset.selected { border-color: #fff; box-shadow: 0 0 15px rgba(255,255,255,0.4); }
        .game-title { text-align: center; padding: 35px 15px 25px; }
        .game-logo {
            font-size: 28px; font-weight: 900;
            background: linear-gradient(135deg, #00d4ff 0%, #0099ff 50%, #ff0066 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 6px; letter-spacing: 1px;
            filter: drop-shadow(0 0 10px rgba(0,212,255,0.5));
        }
        .game-subtitle { font-size: 10px; color: rgba(255,255,255,0.5); letter-spacing: 3px; text-transform: uppercase; }
        .menu-section { padding: 15px 20px; display: flex; flex-direction: column; gap: 10px; }
        .menu-btn {
            width: 100%; padding: 12px 16px; border: none; border-radius: 10px; font-size: 14px; font-weight: 600;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .menu-btn:hover { transform: translateY(-2px); }
        .menu-btn:active { transform: translateY(0) scale(0.98); }
        .btn-start { background: linear-gradient(135deg, #00d4ff 0%, #0099ff 100%); color: #fff; box-shadow: 0 4px 15px rgba(0,212,255,0.4); }
        .btn-skin { background: linear-gradient(135deg, #ff6b6b 0%, #ff8e53 100%); color: #fff; box-shadow: 0 4px 15px rgba(255,107,107,0.4); }
        .btn-achievement { background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%); color: #fff; box-shadow: 0 4px 15px rgba(161,140,209,0.4); }
        .btn-settings { background: rgba(255,255,255,0.08); color: #fff; border: 1px solid rgba(255,255,255,0.2); }
        .footer-info { position: absolute; bottom: 15px; left: 0; right: 0; text-align: center; font-size: 10px; color: rgba(255,255,255,0.35); }
        .player-level {
            display: inline-block; padding: 4px 10px; background: rgba(0,212,255,0.15); border-radius: 10px;
            margin-bottom: 6px; border: 1px solid rgba(0,212,255,0.3); color: #00d4ff; font-weight: 600;
        }
        .stars { position: absolute; top: 0; left: 0; right: 0; bottom: 0; overflow: hidden; }
        .star { position: absolute; width: 2px; height: 2px; background: rgba(255,255,255,0.8); border-radius: 50%; animation: twinkle 2s infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        .texture-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; opacity: 0.3; mix-blend-mode: overlay; }
        .grid-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; display: none; z-index: 10; }
        .grid-overlay.active { display: block; background-image: linear-gradient(rgba(0,212,255,0.15) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,255,0.15) 1px, transparent 1px); background-size: 20px 20px; }
        /* 工具栏 */
        .toolbar {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 200;
        }
        .toolbar-btn {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #00d4ff 0%, #0099ff 100%);
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(0,212,255,0.4);
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .toolbar-btn:hover { transform: scale(1.1) rotate(5deg); box-shadow: 0 8px 30px rgba(0,212,255,0.6); }
        .toolbar-btn:active { transform: scale(0.95); }
        .toolbar-btn.secondary { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); }
        @media (max-width: 768px) {
            .main-container { flex-direction: column; }
            .preview-section { width: 100%; max-width: none; min-width: auto; border-right: none; border-bottom: 1px solid rgba(255,255,255,0.08); }
            #preview { max-width: 300px; height: 533px; }
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.03); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎮 雷霆战机 UI 美术设计</h1>
        <div class="header-actions">
            <button class="header-btn secondary" onclick="resetDesign()">🔄</button>
            <button class="header-btn primary" onclick="exportDesign()">💾</button>
        </div>
    </div>

    <div class="main-container">
        <div class="preview-section">
            <div id="preview">
                <div class="stars" id="stars"></div>
                <div class="texture-overlay" id="textureOverlay"></div>
                <div class="grid-overlay" id="gridOverlay"></div>

                <div class="game-title">
                    <div class="game-logo" id="gameLogo">雷霆战机</div>
                    <div class="game-subtitle" id="gameSubtitle">THUNDER FIGHTER</div>
                </div>

                <div class="menu-section">
                    <button class="menu-btn btn-start" id="btnStart">
                        <span>🚀</span>
                        <span id="btnStartText">开始游戏</span>
                    </button>
                    <button class="menu-btn btn-skin" id="btnSkin">
                        <span>👕</span>
                        <span id="btnSkinText">皮肤系统</span>
                    </button>
                    <button class="menu-btn btn-achievement" id="btnAchieve">
                        <span>🏆</span>
                        <span id="btnAchieveText">成就系统</span>
                    </button>
                    <button class="menu-btn btn-settings" id="btnSettings">
                        <span>⚙️</span>
                        <span id="btnSettingsText">设置</span>
                    </button>
                </div>

                <div class="footer-info">
                    <div class="player-level" id="playerLevel">Lv.99 王牌飞行员</div>
                    <div id="versionInfo">Version 1.0.0</div>
                </div>
            </div>
        </div>

        <div class="config-section">
            <div class="config-panel active">
                <div class="config-header">
                    <div class="config-title"><span class="config-icon">🎨</span><span>快捷主题</span></div>
                    <span class="toggle-icon">▶</span>
                </div>
                <div class="config-content">
                    <div class="theme-presets">
                        <div class="theme-preset" style="background: linear-gradient(135deg, #00d4ff 0%, #0099ff 100%)" onclick="applyTheme('cyber')">赛博</div>
                        <div class="theme-preset" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%)" onclick="applyTheme('neon')">霓虹</div>
                        <div class="theme-preset" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)" onclick="applyTheme('ocean')">海洋</div>
                        <div class="theme-preset" style="background: linear-gradient(135deg, #fa709a 0%, #fee140 100%)" onclick="applyTheme('sunset')">日落</div>
                        <div class="theme-preset" style="background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%)" onclick="applyTheme('purple')">紫罗兰</div>
                        <div class="theme-preset" style="background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)" onclick="applyTheme('matrix')">矩阵</div>
                    </div>
                </div>
            </div>

            <div class="config-panel active" onclick="togglePanel(this, event)">
                <div class="config-header">
                    <div class="config-title"><span class="config-icon">🌌</span><span>背景底纹</span></div>
                    <span class="toggle-icon">▶</span>
                </div>
                <div class="config-content">
                    <div class="config-subsection">
                        <h4>底纹预设</h4>
                        <div class="texture-presets">
                            <div class="texture-preset" style="background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px); background-size: 10px 10px;" onclick="applyTexture('dots')"></div>
                            <div class="texture-preset" style="background: repeating-linear-gradient(45deg, rgba(255,255,255,0.05) 0px, rgba(255,255,255,0.05) 2px, transparent 2px, transparent 4px);" onclick="applyTexture('stripes')"></div>
                            <div class="texture-preset" style="background: radial-gradient(circle at center, rgba(255,255,255,0.1) 0%, transparent 70%);" onclick="applyTexture('vignette')"></div>
                            <div class="texture-preset" style="background: url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNCIgaGVpZ2h0PSI0IiB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciPjxjaXJjbGUgY3g9IjIiIGN5PSIyIiByPSIxIiBmaWxsPSJyZ2JhKDI1NSwyNTUsMjU1LDAuMSkiLz48L3N2Zz4=');" onclick="applyTexture('noise')"></div>
                            <div class="texture-preset" style="background: linear-gradient(135deg, rgba(255,255,255,0.1) 25%, transparent 25%, transparent 50%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.1) 75%, transparent 75%, transparent); background-size: 20px 20px;" onclick="applyTexture('grid')"></div>
                            <div class="texture-preset" style="background: radial-gradient(ellipse at center, rgba(0,212,255,0.15) 0%, transparent 70%);" onclick="applyTexture('glow')"></div>
                            <div class="texture-preset" style="background: conic-gradient(from 0deg, rgba(255,255,255,0.05) 0deg 30deg, transparent 30deg 60deg); background-size: 60px 60px;" onclick="applyTexture('radial')"></div>
                            <div class="texture-preset" style="background: none;" onclick="applyTexture('none')"></div>
                        </div>
                    </div>
                    <div class="config-subsection">
                        <h4>底纹强度</h4>
                        <input type="range" min="0" max="100" value="30" oninput="updateTextureOpacity()" onclick="event.stopPropagation()">
                        <div class="value-display" id="textureOpacityVal">30%</div>
                    </div>
                </div>
            </div>

            <div class="config-panel" onclick="togglePanel(this, event)">
                <div class="config-header">
                    <div class="config-title"><span class="config-icon">🚀</span><span>开始按钮</span></div>
                    <span class="toggle-icon">▶</span>
                </div>
                <div class="config-content">
                    <div class="config-subsection">
                        <h4>文字</h4>
                        <input type="text" id="btnStartTextInput" value="开始游戏" oninput="updateBtnText('start')" onclick="event.stopPropagation()">
                    </div>
                    <div class="config-subsection">
                        <h4>颜色</h4>
                        <div class="control-row">
                            <div class="control-item"><label>颜色 1</label><input type="color" id="btnStartColor1" value="#00d4ff" oninput="updateBtn('start')" onclick="event.stopPropagation()"></div>
                            <div class="control-item"><label>颜色 2</label><input type="color" id="btnStartColor2" value="#0099ff" oninput="updateBtn('start')" onclick="event.stopPropagation()"></div>
                        </div>
                    </div>
                    <div class="config-subsection">
                        <h4>样式</h4>
                        <label>圆角</label>
                        <input type="range" min="0" max="20" value="10" oninput="updateBtn('start')" onclick="event.stopPropagation()">
                        <div class="value-display" id="btnStartRadiusVal">10px</div>
                    </div>
                </div>
            </div>

            <div class="config-panel" onclick="togglePanel(this, event)">
                <div class="config-header">
                    <div class="config-title"><span class="config-icon">👕</span><span>皮肤按钮</span></div>
                    <span class="toggle-icon">▶</span>
                </div>
                <div class="config-content">
                    <div class="config-subsection">
                        <h4>文字</h4>
                        <input type="text" id="btnSkinTextInput" value="皮肤系统" oninput="updateBtnText('skin')" onclick="event.stopPropagation()">
                    </div>
                    <div class="config-subsection">
                        <h4>颜色</h4>
                        <div class="control-row">
                            <div class="control-item"><label>颜色 1</label><input type="color" id="btnSkinColor1" value="#ff6b6b" oninput="updateBtn('skin')" onclick="event.stopPropagation()"></div>
                            <div class="control-item"><label>颜色 2</label><input type="color" id="btnSkinColor2" value="#ff8e53" oninput="updateBtn('skin')" onclick="event.stopPropagation()"></div>
                        </div>
                    </div>
                    <div class="config-subsection">
                        <h4>样式</h4>
                        <label>圆角</label>
                        <input type="range" min="0" max="20" value="10" oninput="updateBtn('skin')" onclick="event.stopPropagation()">
                        <div class="value-display" id="btnSkinRadiusVal">10px</div>
                    </div>
                </div>
            </div>

            <div class="config-panel" onclick="togglePanel(this, event)">
                <div class="config-header">
                    <div class="config-title"><span class="config-icon">🏆</span><span>成就按钮</span></div>
                    <span class="toggle-icon">▶</span>
                </div>
                <div class="config-content">
                    <div class="config-subsection">
                        <h4>文字</h4>
                        <input type="text" id="btnAchieveTextInput" value="成就系统" oninput="updateBtnText('achieve')" onclick="event.stopPropagation()">
                    </div>
                    <div class="config-subsection">
                        <h4>颜色</h4>
                        <div class="control-row">
                            <div class="control-item"><label>颜色 1</label><input type="color" id="btnAchieveColor1" value="#a18cd1" oninput="updateBtn('achieve')" onclick="event.stopPropagation()"></div>
                            <div class="control-item"><label>颜色 2</label><input type="color" id="btnAchieveColor2" value="#fbc2eb" oninput="updateBtn('achieve')" onclick="event.stopPropagation()"></div>
                        </div>
                    </div>
                    <div class="config-subsection">
                        <h4>样式</h4>
                        <label>圆角</label>
                        <input type="range" min="0" max="20" value="10" oninput="updateBtn('achieve')" onclick="event.stopPropagation()">
                        <div class="value-display" id="btnAchieveRadiusVal">10px</div>
                    </div>
                </div>
            </div>

            <div class="config-panel" onclick="togglePanel(this, event)">
                <div class="config-header">
                    <div class="config-title"><span class="config-icon">⚙️</span><span>设置按钮</span></div>
                    <span class="toggle-icon">▶</span>
                </div>
                <div class="config-content">
                    <div class="config-subsection">
                        <h4>文字</h4>
                        <input type="text" id="btnSettingsTextInput" value="设置" oninput="updateBtnText('settings')" onclick="event.stopPropagation()">
                    </div>
                    <div class="config-subsection">
                        <h4>颜色</h4>
                        <div class="control-row">
                            <div class="control-item"><label>背景</label><input type="color" id="btnSettingsBg" value="#ffffff" style="opacity:0.1" oninput="updateBtn('settings')" onclick="event.stopPropagation()"></div>
                            <div class="control-item"><label>边框</label><input type="color" id="btnSettingsBorder" value="#ffffff" oninput="updateBtn('settings')" onclick="event.stopPropagation()"></div>
                        </div>
                    </div>
                    <div class="config-subsection">
                        <h4>样式</h4>
                        <label>圆角</label>
                        <input type="range" min="0" max="20" value="10" oninput="updateBtn('settings')" onclick="event.stopPropagation()">
                        <div class="value-display" id="btnSettingsRadiusVal">10px</div>
                    </div>
                </div>
            </div>

            <div class="config-panel" onclick="togglePanel(this, event)">
                <div class="config-header">
                    <div class="config-title"><span class="config-icon">📝</span><span>标题</span></div>
                    <span class="toggle-icon">▶</span>
                </div>
                <div class="config-content">
                    <div class="config-subsection">
                        <h4>文字</h4>
                        <input type="text" id="logoInput" value="雷霆战机" oninput="update()" onclick="event.stopPropagation()">
                        <input type="text" id="subtitleInput" value="THUNDER FIGHTER" oninput="update()" style="margin-top:8px;" onclick="event.stopPropagation()">
                    </div>
                    <div class="config-subsection">
                        <h4>大小</h4>
                        <input type="range" min="20" max="48" value="28" oninput="updateLogoStyle()" onclick="event.stopPropagation()">
                        <div class="value-display" id="logoSizeVal">28px</div>
                    </div>
                    <div class="config-subsection">
                        <h4>渐变</h4>
                        <div class="gradient-presets">
                            <div class="gradient-preset" style="background: linear-gradient(135deg, #00d4ff 0%, #0099ff 50%, #ff0066 100%)" onclick="applyTitleGradient(this)"></div>
                            <div class="gradient-preset" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%)" onclick="applyTitleGradient(this)"></div>
                            <div class="gradient-preset" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)" onclick="applyTitleGradient(this)"></div>
                            <div class="gradient-preset" style="background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)" onclick="applyTitleGradient(this)"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="config-panel" onclick="togglePanel(this, event)">
                <div class="config-header">
                    <div class="config-title"><span class="config-icon">🌌</span><span>背景</span></div>
                    <span class="toggle-icon">▶</span>
                </div>
                <div class="config-content">
                    <div class="config-subsection">
                        <h4>渐变</h4>
                        <div class="control-row">
                            <div class="control-item"><label>上</label><input type="color" id="bgColor1" value="#1a1a3e" oninput="updateBgStyle()" onclick="event.stopPropagation()"></div>
                            <div class="control-item"><label>下</label><input type="color" id="bgColor2" value="#0a0a1a" oninput="updateBgStyle()" onclick="event.stopPropagation()"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="config-panel" onclick="togglePanel(this, event)">
                <div class="config-header">
                    <div class="config-title"><span class="config-icon">✨</span><span>特效</span></div>
                    <span class="toggle-icon">▶</span>
                </div>
                <div class="config-content">
                    <div class="config-subsection">
                        <h4>星星</h4>
                        <input type="range" min="0" max="200" value="50" oninput="updateStars()" onclick="event.stopPropagation()">
                        <div class="value-display" id="starsVal">50 颗</div>
                    </div>
                    <div class="config-subsection">
                        <h4>发光</h4>
                        <input type="range" min="0" max="100" value="50" oninput="updateGlow()" onclick="event.stopPropagation()">
                        <div class="value-display" id="glowVal">50%</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 快捷工具栏 -->
    <div class="toolbar">
        <button class="toolbar-btn secondary" onclick="toggleAllPanels()" title="展开/收起">📋</button>
        <button class="toolbar-btn" onclick="toggleGrid()" title="网格线">📐</button>
    </div>

    <script>
        let currentStars = 50;
        let textureOpacity = 0.3;
        let gridVisible = false;

        function createStars(count) {
            const container = document.getElementById('stars');
            container.innerHTML = '';
            for (let i = 0; i < count; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 2 + 's';
                container.appendChild(star);
            }
        }

        // 修复面板切换逻辑 - 只有点击标题才切换
        function togglePanel(panel, event) {
            // 只有点击 header 才切换
            if (event.target.closest('.config-header')) {
                panel.classList.toggle('active');
            }
        }

        function toggleAllPanels() {
            const panels = document.querySelectorAll('.config-panel');
            const allActive = Array.from(panels).every(p => p.classList.contains('active'));
            panels.forEach(p => p.classList.toggle('active', !allActive));
        }

        function toggleGrid() {
            gridVisible = !gridVisible;
            document.getElementById('gridOverlay').classList.toggle('active', gridVisible);
        }

        function update() {
            document.getElementById('gameLogo').textContent = document.getElementById('logoInput').value;
            document.getElementById('gameSubtitle').textContent = document.getElementById('subtitleInput').value;
        }

        function updateBtnText(type) {
            const map = { start: 'btnStartText', skin: 'btnSkinText', achieve: 'btnAchieveText', settings: 'btnSettingsText' };
            const inputId = 'btn' + type.charAt(0).toUpperCase() + type.slice(1) + 'TextInput';
            document.getElementById(map[type]).textContent = document.getElementById(inputId).value;
        }

        function updateBtn(type) {
            const btn = document.getElementById('btn' + type.charAt(0).toUpperCase() + type.slice(1));
            let bg, radius;
            if (type === 'settings') {
                const bgCol = document.getElementById('btnSettingsBg').value;
                const borderCol = document.getElementById('btnSettingsBorder').value;
                bg = bgCol + '11';
                btn.style.borderColor = borderCol + '33';
                const slider = event.target.closest('input[type="range"]');
                radius = slider ? slider.value : 10;
                document.getElementById('btnSettingsRadiusVal').textContent = radius + 'px';
            } else {
                const c1 = document.getElementById('btn' + type.charAt(0).toUpperCase() + type.slice(1) + 'Color1').value;
                const c2 = document.getElementById('btn' + type.charAt(0).toUpperCase() + type.slice(1) + 'Color2').value;
                bg = `linear-gradient(135deg, ${c1} 0%, ${c2} 100%)`;
                const slider = event.target.closest('input[type="range"]');
                radius = slider ? slider.value : 10;
                document.getElementById('btn' + type.charAt(0).toUpperCase() + type.slice(1) + 'RadiusVal').textContent = radius + 'px';
            }
            btn.style.background = bg;
            btn.style.borderRadius = radius + 'px';
        }

        function updateLogoStyle() {
            const size = event.target.value;
            document.getElementById('gameLogo').style.fontSize = size + 'px';
            document.getElementById('logoSizeVal').textContent = size + 'px';
        }

        function applyTitleGradient(el) {
            document.querySelectorAll('.gradient-preset').forEach(p => p.classList.remove('selected'));
            el.classList.add('selected');
            const bg = getComputedStyle(el).background;
            document.getElementById('gameLogo').style.background = bg;
            document.getElementById('gameLogo').style.webkitBackgroundClip = 'text';
        }

        function updateBgStyle() {
            const c1 = document.getElementById('bgColor1').value;
            const c2 = document.getElementById('bgColor2').value;
            document.getElementById('preview').style.background = `linear-gradient(180deg, ${c1} 0%, ${c2} 100%)`;
        }

        function updateStars() {
            const value = event.target.value;
            currentStars = parseInt(value);
            createStars(currentStars);
            document.getElementById('starsVal').textContent = value + '颗';
        }

        function updateGlow() {
            const value = event.target.value;
            const glow = value / 50;
            document.getElementById('gameLogo').style.textShadow = `0 0 ${10 + glow*10}px rgba(0,212,255,${0.3 + glow*0.2})`;
            document.getElementById('glowVal').textContent = value + '%';
        }

        function applyTexture(type) {
            document.querySelectorAll('.texture-preset').forEach(p => p.classList.remove('selected'));
            event.target.classList.add('selected');
            
            const textures = {
                dots: 'radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px)',
                stripes: 'repeating-linear-gradient(45deg, rgba(255,255,255,0.05) 0px, rgba(255,255,255,0.05) 2px, transparent 2px, transparent 4px)',
                vignette: 'radial-gradient(circle at center, rgba(255,255,255,0.1) 0%, transparent 70%)',
                noise: 'url("data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNCIgaGVpZ2h0PSI0IiB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciPjxjaXJjbGUgY3g9IjIiIGN5PSIyIiByPSIxIiBmaWxsPSJyZ2JhKDI1NSwyNTUsMjU1LDAuMSkiLz48L3N2Zz4=")',
                grid: 'linear-gradient(135deg, rgba(255,255,255,0.1) 25%, transparent 25%, transparent 50%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.1) 75%, transparent 75%, transparent)',
                glow: 'radial-gradient(ellipse at center, rgba(0,212,255,0.15) 0%, transparent 70%)',
                radial: 'conic-gradient(from 0deg, rgba(255,255,255,0.05) 0deg 30deg, transparent 30deg 60deg)',
                none: 'none'
            };
            
            document.getElementById('textureOverlay').style.background = textures[type];
            document.getElementById('textureOverlay').style.backgroundSize = type === 'grid' ? '20px 20px' : (type === 'radial' ? '60px 60px' : 'auto');
        }

        function updateTextureOpacity() {
            const value = event.target.value;
            textureOpacity = value / 100;
            document.getElementById('textureOverlay').style.opacity = textureOpacity;
            document.getElementById('textureOpacityVal').textContent = value + '%';
        }

        function applyTheme(theme) {
            const themes = {
                cyber: { bg1: '#1a1a3e', bg2: '#0a0a1a', btns: { start: ['#00d4ff','#0099ff'], skin: ['#ff6b6b','#ff8e53'], achieve: ['#a18cd1','#fbc2eb'] } },
                neon: { bg1: '#2d1b4e', bg2: '#1a0f2e', btns: { start: ['#f093fb','#f5576c'], skin: ['#ff6b6b','#ff8e53'], achieve: ['#a18cd1','#fbc2eb'] } },
                ocean: { bg1: '#1a3a5c', bg2: '#0a1a2e', btns: { start: ['#4facfe','#00f2fe'], skin: ['#ff6b6b','#ff8e53'], achieve: ['#a18cd1','#fbc2eb'] } },
                sunset: { bg1: '#3a1a3e', bg2: '#1a0a1e', btns: { start: ['#fa709a','#fee140'], skin: ['#ff6b6b','#ff8e53'], achieve: ['#a18cd1','#fbc2eb'] } },
                purple: { bg1: '#2a1a4e', bg2: '#1a0a2e', btns: { start: ['#a18cd1','#fbc2eb'], skin: ['#ff6b6b','#ff8e53'], achieve: ['#a18cd1','#fbc2eb'] } },
                matrix: { bg1: '#0a2a1e', bg2: '#0a1a14', btns: { start: ['#43e97b','#38f9d7'], skin: ['#ff6b6b','#ff8e53'], achieve: ['#a18cd1','#fbc2eb'] } }
            };
            const t = themes[theme];
            document.getElementById('bgColor1').value = t.bg1;
            document.getElementById('bgColor2').value = t.bg2;
            updateBgStyle();
            
            Object.keys(t.btns).forEach(key => {
                document.getElementById('btn' + key.charAt(0).toUpperCase() + key.slice(1) + 'Color1').value = t.btns[key][0];
                document.getElementById('btn' + key.charAt(0).toUpperCase() + key.slice(1) + 'Color2').value = t.btns[key][1];
                updateBtn(key);
            });
        }

        function resetDesign() { if (confirm('确定要重置所有设置吗？')) location.reload(); }
        
        function exportDesign() {
            const design = {
                logo: document.getElementById('gameLogo').textContent,
                subtitle: document.getElementById('gameSubtitle').textContent,
                theme: 'custom'
            };
            const blob = new Blob([JSON.stringify(design, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = 'ui-design.json'; a.click();
            URL.revokeObjectURL(url);
        }

        // 初始化
        createStars(50);
        update();
    </script>
</body>
</html>

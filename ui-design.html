<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UI 设计工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 顶部标签 */
        .tabs {
            display: flex;
            background: #fff;
            border-bottom: 1px solid #e0e0e0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            font-size: 14px;
            color: #666;
            cursor: pointer;
            transition: all 0.3s;
            border-bottom: 2px solid transparent;
        }

        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
            font-weight: 600;
        }

        /* 预览区 */
        .preview-area {
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        #preview {
            width: 375px;
            min-height: 667px;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
            overflow: hidden;
            transition: all 0.3s;
        }

        /* 手机状态栏 */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 16px;
            font-size: 12px;
            color: #333;
            background: #f8f9fa;
        }

        /* 内容区 */
        .content {
            padding: 24px;
        }

        .header-section {
            margin-bottom: 32px;
        }

        .main-title {
            font-size: 28px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .subtitle {
            font-size: 15px;
            color: #999;
            line-height: 1.5;
        }

        /* 按钮组 */
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 32px;
        }

        .btn {
            width: 100%;
            padding: 16px 24px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #f8f9fa;
            color: #333;
            border: 1px solid #e0e0e0;
        }

        .btn-ghost {
            background: transparent;
            color: #667eea;
        }

        /* 卡片组 */
        .card-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 32px;
        }

        .card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .card-desc {
            font-size: 13px;
            color: #999;
            line-height: 1.5;
        }

        /* 底部导航 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            background: #ffffff;
            border-top: 1px solid #e0e0e0;
            padding: 8px 0 16px;
            z-index: 100;
        }

        .nav-item {
            flex: 1;
            text-align: center;
            padding: 4px 8px;
            font-size: 11px;
            color: #999;
            cursor: pointer;
        }

        .nav-item.active {
            color: #667eea;
        }

        .nav-icon {
            font-size: 22px;
            display: block;
            margin-bottom: 2px;
        }

        /* 控制面板 */
        .control-panel {
            background: #fff;
            border-top: 1px solid #e0e0e0;
            padding: 16px;
            max-height: calc(100vh - 400px);
            overflow-y: auto;
        }

        .panel-section {
            margin-bottom: 24px;
        }

        .panel-section h3 {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .control-row {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }

        .control-item {
            flex: 1;
        }

        .control-item label {
            display: block;
            font-size: 12px;
            color: #666;
            margin-bottom: 6px;
        }

        .control-item input[type="text"],
        .control-item input[type="number"],
        .control-item select {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-size: 13px;
            background: #f8f9fa;
        }

        .control-item input[type="color"] {
            width: 100%;
            height: 40px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            padding: 2px;
            cursor: pointer;
        }

        .control-item input[type="range"] {
            width: 100%;
            height: 6px;
            -webkit-appearance: none;
            background: #e0e0e0;
            border-radius: 3px;
            outline: none;
        }

        .control-item input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: #667eea;
            border-radius: 50%;
            cursor: pointer;
        }

        .value-display {
            text-align: right;
            font-size: 11px;
            color: #999;
            margin-top: 4px;
        }

        /* 开关 */
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .3s;
            border-radius: 26px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #667eea;
        }

        input:checked + .slider:before {
            transform: translateX(24px);
        }

        .switch-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
        }

        .switch-label {
            font-size: 13px;
            color: #333;
        }

        /* 渐变预设 */
        .gradient-presets {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-top: 10px;
        }

        .gradient-preset {
            height: 40px;
            border-radius: 6px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }

        .gradient-preset:hover {
            transform: scale(1.05);
        }

        .gradient-preset.selected {
            border-color: #667eea;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.4);
        }

        /* 毛玻璃效果 */
        .glass-preview {
            height: 60px;
            border-radius: 8px;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 13px;
            font-weight: 500;
        }

        /* 底部操作栏 */
        .action-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            background: #fff;
            border-top: 1px solid #e0e0e0;
            padding: 12px 16px;
            gap: 12px;
            z-index: 200;
        }

        .action-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }

        .action-btn.primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }

        .action-btn.secondary {
            background: #f8f9fa;
            color: #333;
            border: 1px solid #e0e0e0;
        }

        /* 隐藏面板 */
        .panel-content {
            display: none;
        }

        .panel-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <!-- 顶部标签 -->
    <div class="tabs">
        <div class="tab active" onclick="switchPanel('layout')">📐 布局</div>
        <div class="tab" onclick="switchPanel('style')">🎨 样式</div>
        <div class="tab" onclick="switchPanel('effect')">✨ 效果</div>
    </div>

    <!-- 预览区 -->
    <div class="preview-area">
        <div id="preview">
            <div class="status-bar" id="statusBar">
                <span>9:41</span>
                <span>📶 🔋</span>
            </div>
            
            <div class="content">
                <div class="header-section">
                    <h1 class="main-title" id="mainTitle">欢迎使用</h1>
                    <p class="subtitle" id="subtitle">调整右侧参数来设计你的界面</p>
                </div>

                <div class="button-group" id="buttonGroup">
                    <button class="btn btn-primary" id="btn1">主要操作</button>
                    <button class="btn btn-secondary" id="btn2">次要操作</button>
                    <button class="btn btn-ghost" id="btn3">幽灵按钮</button>
                </div>

                <div class="card-group">
                    <div class="card" id="card1">
                        <div class="card-title">卡片标题</div>
                        <div class="card-desc">这是一段卡片描述文字，用来展示卡片的样式效果</div>
                    </div>
                    <div class="card" id="card2">
                        <div class="card-title">卡片标题</div>
                        <div class="card-desc">这是另一段卡片描述文字</div>
                    </div>
                </div>
            </div>

            <div class="bottom-nav" id="bottomNav">
                <div class="nav-item active">
                    <span class="nav-icon">🏠</span>
                    首页
                </div>
                <div class="nav-item">
                    <span class="nav-icon">🔍</span>
                    发现
                </div>
                <div class="nav-item">
                    <span class="nav-icon">👤</span>
                    我的
                </div>
            </div>
        </div>
    </div>

    <!-- 控制面板 -->
    <div class="control-panel">
        <!-- 布局面板 -->
        <div id="panel-layout" class="panel-content active">
            <div class="panel-section">
                <h3>📝 标题</h3>
                <div class="control-item">
                    <label>主标题</label>
                    <input type="text" id="titleInput" value="欢迎使用" oninput="update()">
                </div>
                <div class="control-item">
                    <label>副标题</label>
                    <input type="text" id="subtitleInput" value="调整右侧参数来设计你的界面" oninput="update()">
                </div>
            </div>

            <div class="panel-section">
                <h3>🔘 按钮</h3>
                <div class="control-item">
                    <label>按钮 1 文字</label>
                    <input type="text" id="btn1Input" value="主要操作" oninput="update()">
                </div>
                <div class="control-item">
                    <label>按钮 2 文字</label>
                    <input type="text" id="btn2Input" value="次要操作" oninput="update()">
                </div>
                <div class="control-item">
                    <label>按钮 3 文字</label>
                    <input type="text" id="btn3Input" value="幽灵按钮" oninput="update()">
                </div>
            </div>

            <div class="panel-section">
                <h3>📦 卡片</h3>
                <div class="control-item">
                    <label>卡片 1 标题</label>
                    <input type="text" value="卡片标题" oninput="update()">
                </div>
                <div class="control-item">
                    <label>卡片 1 描述</label>
                    <input type="text" value="这是一段卡片描述文字，用来展示卡片的样式效果" oninput="update()">
                </div>
            </div>

            <div class="panel-section">
                <h3>🧭 底部导航</h3>
                <div class="switch-row">
                    <span class="switch-label">显示导航</span>
                    <label class="switch">
                        <input type="checkbox" checked onchange="toggleNav(this.checked)">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
        </div>

        <!-- 样式面板 -->
        <div id="panel-style" class="panel-content">
            <div class="panel-section">
                <h3>🎨 主标题样式</h3>
                <div class="control-row">
                    <div class="control-item">
                        <label>大小</label>
                        <input type="range" min="20" max="40" value="28" oninput="updateTitleStyle()">
                        <div class="value-display" id="titleSizeVal">28px</div>
                    </div>
                    <div class="control-item">
                        <label>颜色</label>
                        <input type="color" id="titleColor" value="#333333" oninput="updateTitleStyle()">
                    </div>
                </div>
            </div>

            <div class="panel-section">
                <h3>🎨 副标题样式</h3>
                <div class="control-row">
                    <div class="control-item">
                        <label>大小</label>
                        <input type="range" min="12" max="20" value="15" oninput="updateSubtitleStyle()">
                        <div class="value-display" id="subtitleSizeVal">15px</div>
                    </div>
                    <div class="control-item">
                        <label>颜色</label>
                        <input type="color" id="subtitleColor" value="#999999" oninput="updateSubtitleStyle()">
                    </div>
                </div>
            </div>

            <div class="panel-section">
                <h3>🔘 按钮 1 样式</h3>
                <div class="control-row">
                    <div class="control-item">
                        <label>底色</label>
                        <input type="color" id="btn1Bg" value="#667eea" oninput="updateBtn1Style()">
                    </div>
                    <div class="control-item">
                        <label>文字</label>
                        <input type="color" id="btn1Color" value="#ffffff" oninput="updateBtn1Style()">
                    </div>
                </div>
                <div class="control-item">
                    <label>圆角</label>
                    <input type="range" min="0" max="30" value="12" oninput="updateBtn1Style()">
                    <div class="value-display" id="btn1RadiusVal">12px</div>
                </div>
            </div>

            <div class="panel-section">
                <h3>🔘 按钮 2 样式</h3>
                <div class="control-row">
                    <div class="control-item">
                        <label>底色</label>
                        <input type="color" id="btn2Bg" value="#f8f9fa" oninput="updateBtn2Style()">
                    </div>
                    <div class="control-item">
                        <label>文字</label>
                        <input type="color" id="btn2Color" value="#333333" oninput="updateBtn2Style()">
                    </div>
                </div>
                <div class="control-item">
                    <label>圆角</label>
                    <input type="range" min="0" max="30" value="12" oninput="updateBtn2Style()">
                    <div class="value-display" id="btn2RadiusVal">12px</div>
                </div>
            </div>

            <div class="panel-section">
                <h3>📦 卡片样式</h3>
                <div class="control-row">
                    <div class="control-item">
                        <label>底色</label>
                        <input type="color" id="cardBg" value="#f8f9fa" oninput="updateCardStyle()">
                    </div>
                    <div class="control-item">
                        <label>圆角</label>
                        <input type="range" min="0" max="30" value="12" oninput="updateCardStyle()">
                        <div class="value-display" id="cardRadiusVal">12px</div>
                    </div>
                </div>
            </div>

            <div class="panel-section">
                <h3>📱 画布</h3>
                <div class="control-item">
                    <label>背景色</label>
                    <input type="color" id="canvasBg" value="#ffffff" oninput="updateCanvasStyle()">
                </div>
            </div>
        </div>

        <!-- 效果面板 -->
        <div id="panel-effect" class="panel-content">
            <div class="panel-section">
                <h3>🌈 渐变预设</h3>
                <div class="gradient-presets">
                    <div class="gradient-preset" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%)" onclick="applyGradient(this, 'btn1')"></div>
                    <div class="gradient-preset" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%)" onclick="applyGradient(this, 'btn1')"></div>
                    <div class="gradient-preset" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)" onclick="applyGradient(this, 'btn1')"></div>
                    <div class="gradient-preset" style="background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)" onclick="applyGradient(this, 'btn1')"></div>
                    <div class="gradient-preset" style="background: linear-gradient(135deg, #fa709a 0%, #fee140 100%)" onclick="applyGradient(this, 'btn1')"></div>
                    <div class="gradient-preset" style="background: linear-gradient(135deg, #30cfd0 0%, #330867 100%)" onclick="applyGradient(this, 'btn1')"></div>
                    <div class="gradient-preset" style="background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%)" onclick="applyGradient(this, 'btn1')"></div>
                    <div class="gradient-preset" style="background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%)" onclick="applyGradient(this, 'btn1')"></div>
                </div>
            </div>

            <div class="panel-section">
                <h3>💎 毛玻璃效果</h3>
                <div class="control-item">
                    <label>模糊强度</label>
                    <input type="range" min="0" max="20" value="0" oninput="updateGlassEffect()">
                    <div class="value-display" id="glassVal">0px</div>
                </div>
                <div class="glass-preview" id="glassPreview" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%)">
                    毛玻璃预览
                </div>
            </div>

            <div class="panel-section">
                <h3>✨ 阴影效果</h3>
                <div class="control-row">
                    <div class="control-item">
                        <label>强度</label>
                        <input type="range" min="0" max="30" value="15" oninput="updateShadow()">
                        <div class="value-display" id="shadowVal">15px</div>
                    </div>
                </div>
            </div>

            <div class="panel-section">
                <h3>📐 间距</h3>
                <div class="control-item">
                    <label>内容内边距</label>
                    <input type="range" min="10" max="40" value="24" oninput="updatePadding()">
                    <div class="value-display" id="paddingVal">24px</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 底部操作栏 -->
    <div class="action-bar">
        <button class="action-btn secondary" onclick="resetDesign()">🔄 重置</button>
        <button class="action-btn primary" onclick="exportDesign()">💾 导出</button>
    </div>

    <script>
        // 切换面板
        function switchPanel(name) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.panel-content').forEach(p => p.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById('panel-' + name).classList.add('active');
        }

        // 更新文字
        function update() {
            document.getElementById('mainTitle').textContent = document.getElementById('titleInput').value;
            document.getElementById('subtitle').textContent = document.getElementById('subtitleInput').value;
            document.getElementById('btn1').textContent = document.getElementById('btn1Input').value;
            document.getElementById('btn2').textContent = document.getElementById('btn2Input').value;
            document.getElementById('btn3').textContent = document.getElementById('btn3Input').value;
        }

        // 切换导航
        function toggleNav(show) {
            document.getElementById('bottomNav').style.display = show ? 'flex' : 'none';
        }

        // 更新标题样式
        function updateTitleStyle() {
            const size = event.target.value;
            const color = document.getElementById('titleColor').value;
            document.getElementById('mainTitle').style.fontSize = size + 'px';
            document.getElementById('mainTitle').style.color = color;
            document.getElementById('titleSizeVal').textContent = size + 'px';
        }

        // 更新副标题样式
        function updateSubtitleStyle() {
            const size = event.target.value;
            const color = document.getElementById('subtitleColor').value;
            document.getElementById('subtitle').style.fontSize = size + 'px';
            document.getElementById('subtitle').style.color = color;
            document.getElementById('subtitleSizeVal').textContent = size + 'px';
        }

        // 更新按钮 1 样式
        function updateBtn1Style() {
            const btn = document.getElementById('btn1');
            const bg = document.getElementById('btn1Bg').value;
            const color = document.getElementById('btn1Color').value;
            const radius = event.target.value;
            
            btn.style.background = `linear-gradient(135deg, ${bg} 0%, ${adjustColor(bg, -20)} 100%)`;
            btn.style.color = color;
            btn.style.borderRadius = radius + 'px';
            document.getElementById('btn1RadiusVal').textContent = radius + 'px';
        }

        // 更新按钮 2 样式
        function updateBtn2Style() {
            const btn = document.getElementById('btn2');
            const bg = document.getElementById('btn2Bg').value;
            const color = document.getElementById('btn2Color').value;
            const radius = event.target.value;
            
            btn.style.background = bg;
            btn.style.color = color;
            btn.style.borderRadius = radius + 'px';
            document.getElementById('btn2RadiusVal').textContent = radius + 'px';
        }

        // 更新卡片样式
        function updateCardStyle() {
            const bg = document.getElementById('cardBg').value;
            const radius = event.target.value;
            
            document.querySelectorAll('.card').forEach(card => {
                card.style.background = bg;
                card.style.borderRadius = radius + 'px';
            });
            document.getElementById('cardRadiusVal').textContent = radius + 'px';
        }

        // 更新画布样式
        function updateCanvasStyle() {
            document.getElementById('preview').style.background = document.getElementById('canvasBg').value;
        }

        // 应用渐变
        function applyGradient(el, target) {
            document.querySelectorAll('.gradient-preset').forEach(p => p.classList.remove('selected'));
            el.classList.add('selected');
            
            const bg = getComputedStyle(el).background;
            document.getElementById('btn1').style.background = bg;
        }

        // 毛玻璃效果
        function updateGlassEffect() {
            const value = event.target.value;
            const preview = document.getElementById('glassPreview');
            preview.style.backdropFilter = `blur(${value}px)`;
            preview.style.webkitBackdropFilter = `blur(${value}px)`;
            document.getElementById('glassVal').textContent = value + 'px';
        }

        // 阴影效果
        function updateShadow() {
            const value = event.target.value;
            document.getElementById('preview').style.boxShadow = `0 ${value}px ${parseInt(value)*2}px rgba(0,0,0,0.12)`;
            document.getElementById('shadowVal').textContent = value + 'px';
        }

        // 更新间距
        function updatePadding() {
            const value = event.target.value;
            document.querySelector('.content').style.padding = value + 'px';
            document.getElementById('paddingVal').textContent = value + 'px';
        }

        // 颜色调整
        function adjustColor(hex, amount) {
            return '#' + hex.replace(/^#/, '').replace(/../g, color => ('0'+Math.min(255, Math.max(0, parseInt(color, 16) + amount)).toString(16)).substr(-2));
        }

        // 重置
        function resetDesign() {
            if (confirm('确定要重置所有设置吗？')) {
                location.reload();
            }
        }

        // 导出
        function exportDesign() {
            const design = {
                title: document.getElementById('mainTitle').textContent,
                subtitle: document.getElementById('subtitle').textContent,
                buttons: [
                    { text: document.getElementById('btn1').textContent, bg: document.getElementById('btn1Bg').value },
                    { text: document.getElementById('btn2').textContent, bg: document.getElementById('btn2Bg').value }
                ],
                colors: {
                    title: document.getElementById('titleColor').value,
                    subtitle: document.getElementById('subtitleColor').value,
                    canvas: document.getElementById('canvasBg').value
                }
            };
            
            const blob = new Blob([JSON.stringify(design, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'ui-design.json';
            a.click();
            URL.revokeObjectURL(url);
        }

        // 初始化
        update();
    </script>
</body>
</html>

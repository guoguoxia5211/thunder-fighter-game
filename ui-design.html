<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>雷霆战机 - UI 设计工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            overflow: hidden;
        }

        /* 顶部标题栏 */
        .header {
            background: rgba(15, 12, 41, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0,212,255,0.2);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            height: 55px;
        }

        .header h1 {
            font-size: 16px;
            background: linear-gradient(135deg, #00d4ff 0%, #0099ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .header-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .header-btn.primary {
            background: linear-gradient(135deg, #00d4ff 0%, #0099ff 100%);
            color: #fff;
        }

        .header-btn.secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* 主容器 - 左右布局 */
        .main-container {
            display: flex;
            height: 100vh;
            padding-top: 55px;
        }

        /* 左侧预览区 */
        .preview-section {
            width: 45%;
            min-width: 280px;
            max-width: 420px;
            background: rgba(15, 12, 41, 0.5);
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            border-right: 1px solid rgba(255,255,255,0.08);
            overflow-y: auto;
        }

        #preview {
            width: 100%;
            max-width: 280px;
            height: 500px;
            background: linear-gradient(180deg, #1a1a3e 0%, #0a0a1a 100%);
            border-radius: 18px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5), 0 0 30px rgba(0,212,255,0.1);
            overflow: hidden;
            position: relative;
            border: 1px solid rgba(255,255,255,0.1);
            transform-origin: top center;
        }

        /* 右侧配置区 */
        .config-section {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: rgba(26, 26, 62, 0.3);
        }

        /* 配置面板 */
        .config-panel {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 12px;
            margin-bottom: 12px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .config-panel.active {
            background: rgba(255,255,255,0.05);
            border-color: rgba(0,212,255,0.2);
        }

        .config-header {
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        .config-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 600;
            color: #fff;
        }

        .config-icon {
            font-size: 16px;
        }

        .toggle-icon {
            font-size: 16px;
            color: rgba(255,255,255,0.4);
            transition: transform 0.3s;
        }

        .config-panel.active .toggle-icon {
            transform: rotate(90deg);
            color: #00d4ff;
        }

        .config-content {
            display: none;
            padding: 16px;
        }

        .config-panel.active .config-content {
            display: block;
        }

        /* 配置子项 */
        .config-subsection {
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .config-subsection:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .config-subsection h4 {
            font-size: 12px;
            color: #00d4ff;
            margin-bottom: 10px;
            font-weight: 600;
        }

        /* 控制项 */
        .control-row {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .control-item {
            flex: 1;
        }

        .control-item label {
            display: block;
            font-size: 11px;
            color: rgba(255,255,255,0.6);
            margin-bottom: 4px;
        }

        .control-item input[type="text"] {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 6px;
            font-size: 13px;
            background: rgba(255,255,255,0.05);
            color: #fff;
        }

        .control-item input[type="color"] {
            width: 100%;
            height: 36px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 6px;
            padding: 2px;
            cursor: pointer;
        }

        .control-item input[type="range"] {
            width: 100%;
            height: 5px;
            -webkit-appearance: none;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
        }

        .control-item input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: linear-gradient(135deg, #00d4ff 0%, #0099ff 100%);
            border-radius: 50%;
            cursor: pointer;
        }

        .value-display {
            text-align: right;
            font-size: 10px;
            color: rgba(0,212,255,0.8);
            margin-top: 4px;
        }

        /* 渐变预设 */
        .gradient-presets {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            margin-top: 8px;
        }

        .gradient-preset {
            height: 36px;
            border-radius: 6px;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .gradient-preset.selected {
            border-color: #00d4ff;
            box-shadow: 0 0 10px rgba(0,212,255,0.4);
        }

        /* 主题预设 */
        .theme-presets {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
        }

        .theme-preset {
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
            text-align: center;
            font-size: 11px;
            font-weight: 600;
            color: #fff;
        }

        .theme-preset.selected {
            border-color: #fff;
        }

        /* 游戏标题区 */
        .game-title {
            text-align: center;
            padding: 40px 15px 30px;
        }

        .game-logo {
            font-size: 32px;
            font-weight: 900;
            background: linear-gradient(135deg, #00d4ff 0%, #0099ff 50%, #ff0066 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .game-subtitle {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            letter-spacing: 3px;
        }

        /* 菜单区 */
        .menu-section {
            padding: 15px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .menu-btn {
            width: 100%;
            padding: 12px 16px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-start {
            background: linear-gradient(135deg, #00d4ff 0%, #0099ff 100%);
            color: #fff;
        }

        .btn-skin {
            background: linear-gradient(135deg, #ff6b6b 0%, #ff8e53 100%);
            color: #fff;
        }

        .btn-achievement {
            background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
            color: #fff;
        }

        .btn-settings {
            background: rgba(255,255,255,0.08);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* 底部信息 */
        .footer-info {
            position: absolute;
            bottom: 15px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 10px;
            color: rgba(255,255,255,0.35);
        }

        .player-level {
            display: inline-block;
            padding: 4px 10px;
            background: rgba(0,212,255,0.15);
            border-radius: 10px;
            margin-bottom: 6px;
            border: 1px solid rgba(0,212,255,0.3);
            color: #00d4ff;
            font-weight: 600;
        }

        /* 星星背景 */
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(255,255,255,0.8);
            border-radius: 50%;
            animation: twinkle 2s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .main-container {
                flex-direction: column;
            }

            .preview-section {
                width: 100%;
                max-width: none;
                min-width: auto;
                padding: 15px;
                border-right: none;
                border-bottom: 1px solid rgba(255,255,255,0.08);
            }

            #preview {
                max-width: 320px;
                height: 568px;
            }

            .config-section {
                padding: 12px;
            }
        }

        /* 滚动条 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.03); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
    </style>
</head>
<body>
    <!-- 顶部标题栏 -->
    <div class="header">
        <h1>🎮 雷霆战机 UI 设计</h1>
        <div class="header-actions">
            <button class="header-btn secondary" onclick="resetDesign()">🔄</button>
            <button class="header-btn primary" onclick="exportDesign()">💾</button>
        </div>
    </div>

    <!-- 主容器 -->
    <div class="main-container">
        <!-- 左侧预览 -->
        <div class="preview-section">
            <div id="preview">
                <div class="stars" id="stars"></div>

                <div class="game-title">
                    <div class="game-logo" id="gameLogo">雷霆战机</div>
                    <div class="game-subtitle" id="gameSubtitle">THUNDER FIGHTER</div>
                </div>

                <div class="menu-section">
                    <button class="menu-btn btn-start" id="btnStart">
                        <span>🚀</span>
                        <span id="btnStartText">开始游戏</span>
                    </button>
                    <button class="menu-btn btn-skin" id="btnSkin">
                        <span>👕</span>
                        <span id="btnSkinText">皮肤系统</span>
                    </button>
                    <button class="menu-btn btn-achievement" id="btnAchieve">
                        <span>🏆</span>
                        <span id="btnAchieveText">成就系统</span>
                    </button>
                    <button class="menu-btn btn-settings" id="btnSettings">
                        <span>⚙️</span>
                        <span id="btnSettingsText">设置</span>
                    </button>
                </div>

                <div class="footer-info">
                    <div class="player-level" id="playerLevel">Lv.99 王牌飞行员</div>
                    <div id="versionInfo">Version 1.0.0</div>
                </div>
            </div>
        </div>

        <!-- 右侧配置 -->
        <div class="config-section">
            <!-- 快捷主题 -->
            <div class="config-panel active">
                <div class="config-header">
                    <div class="config-title">
                        <span class="config-icon">🎨</span>
                        <span>快捷主题</span>
                    </div>
                    <span class="toggle-icon">▶</span>
                </div>
                <div class="config-content">
                    <div class="theme-presets">
                        <div class="theme-preset" style="background: linear-gradient(135deg, #00d4ff 0%, #0099ff 100%)" onclick="applyTheme('cyber')">赛博</div>
                        <div class="theme-preset" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%)" onclick="applyTheme('neon')">霓虹</div>
                        <div class="theme-preset" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)" onclick="applyTheme('ocean')">海洋</div>
                        <div class="theme-preset" style="background: linear-gradient(135deg, #fa709a 0%, #fee140 100%)" onclick="applyTheme('sunset')">日落</div>
                        <div class="theme-preset" style="background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%)" onclick="applyTheme('purple')">紫罗兰</div>
                        <div class="theme-preset" style="background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)" onclick="applyTheme('matrix')">矩阵</div>
                    </div>
                </div>
            </div>

            <!-- 标题样式 -->
            <div class="config-panel active" onclick="togglePanel(this)">
                <div class="config-header">
                    <div class="config-title">
                        <span class="config-icon">📝</span>
                        <span>标题</span>
                    </div>
                    <span class="toggle-icon">▶</span>
                </div>
                <div class="config-content">
                    <div class="config-subsection">
                        <h4>大小</h4>
                        <input type="range" min="24" max="48" value="32" oninput="updateLogoStyle()">
                        <div class="value-display" id="logoSizeVal">32px</div>
                    </div>
                    <div class="config-subsection">
                        <h4>渐变</h4>
                        <div class="gradient-presets">
                            <div class="gradient-preset" style="background: linear-gradient(135deg, #00d4ff 0%, #0099ff 50%, #ff0066 100%)" onclick="applyTitleGradient(this)"></div>
                            <div class="gradient-preset" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%)" onclick="applyTitleGradient(this)"></div>
                            <div class="gradient-preset" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)" onclick="applyTitleGradient(this)"></div>
                            <div class="gradient-preset" style="background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)" onclick="applyTitleGradient(this)"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 背景 -->
            <div class="config-panel" onclick="togglePanel(this)">
                <div class="config-header">
                    <div class="config-title">
                        <span class="config-icon">🌌</span>
                        <span>背景</span>
                    </div>
                    <span class="toggle-icon">▶</span>
                </div>
                <div class="config-content">
                    <div class="config-subsection">
                        <h4>颜色</h4>
                        <div class="control-row">
                            <div class="control-item">
                                <label>上</label>
                                <input type="color" id="bgColor1" value="#1a1a3e" oninput="updateBgStyle()">
                            </div>
                            <div class="control-item">
                                <label>下</label>
                                <input type="color" id="bgColor2" value="#0a0a1a" oninput="updateBgStyle()">
                            </div>
                        </div>
                    </div>
                    <div class="config-subsection">
                        <h4>星星</h4>
                        <input type="range" min="0" max="100" value="50" oninput="updateStars()">
                        <div class="value-display" id="starsVal">50 颗</div>
                    </div>
                </div>
            </div>

            <!-- 按钮 -->
            <div class="config-panel" onclick="togglePanel(this)">
                <div class="config-header">
                    <div class="config-title">
                        <span class="config-icon">🔘</span>
                        <span>按钮</span>
                    </div>
                    <span class="toggle-icon">▶</span>
                </div>
                <div class="config-content">
                    <div class="config-subsection">
                        <h4>开始按钮</h4>
                        <div class="control-row">
                            <div class="control-item">
                                <label>颜色 1</label>
                                <input type="color" id="btn1Color1" value="#00d4ff" oninput="updateBtn1Style()">
                            </div>
                            <div class="control-item">
                                <label>颜色 2</label>
                                <input type="color" id="btn1Color2" value="#0099ff" oninput="updateBtn1Style()">
                            </div>
                        </div>
                        <label>圆角</label>
                        <input type="range" min="0" max="20" value="10" oninput="updateBtn1Style()">
                        <div class="value-display" id="btn1RadiusVal">10px</div>
                    </div>
                </div>
            </div>

            <!-- 文字 -->
            <div class="config-panel" onclick="togglePanel(this)">
                <div class="config-header">
                    <div class="config-title">
                        <span class="config-icon">⚙️</span>
                        <span>文字</span>
                    </div>
                    <span class="toggle-icon">▶</span>
                </div>
                <div class="config-content">
                    <div class="config-subsection">
                        <label>标题</label>
                        <input type="text" id="logoInput" value="雷霆战机" oninput="update()">
                    </div>
                    <div class="config-subsection">
                        <label>副标题</label>
                        <input type="text" id="subtitleInput" value="THUNDER FIGHTER" oninput="update()">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function createStars(count) {
            const container = document.getElementById('stars');
            container.innerHTML = '';
            for (let i = 0; i < count; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 2 + 's';
                container.appendChild(star);
            }
        }

        function togglePanel(panel) {
            panel.classList.toggle('active');
        }

        function update() {
            document.getElementById('gameLogo').textContent = document.getElementById('logoInput').value;
            document.getElementById('gameSubtitle').textContent = document.getElementById('subtitleInput').value;
        }

        function updateLogoStyle() {
            const size = event.target.value;
            document.getElementById('gameLogo').style.fontSize = size + 'px';
            document.getElementById('logoSizeVal').textContent = size + 'px';
        }

        function applyTitleGradient(el) {
            document.querySelectorAll('.gradient-preset').forEach(p => p.classList.remove('selected'));
            el.classList.add('selected');
            const bg = getComputedStyle(el).background;
            document.getElementById('gameLogo').style.background = bg;
            document.getElementById('gameLogo').style.webkitBackgroundClip = 'text';
        }

        function updateBgStyle() {
            const c1 = document.getElementById('bgColor1').value;
            const c2 = document.getElementById('bgColor2').value;
            document.getElementById('preview').style.background = `linear-gradient(180deg, ${c1} 0%, ${c2} 100%)`;
        }

        function updateStars() {
            const value = event.target.value;
            createStars(value);
            document.getElementById('starsVal').textContent = value + '颗';
        }

        function updateBtn1Style() {
            const btn = document.getElementById('btnStart');
            const c1 = document.getElementById('btn1Color1').value;
            const c2 = document.getElementById('btn1Color2').value;
            const radius = event.target.value;
            btn.style.background = `linear-gradient(135deg, ${c1} 0%, ${c2} 100%)`;
            btn.style.borderRadius = radius + 'px';
            document.getElementById('btn1RadiusVal').textContent = radius + 'px';
        }

        function applyTheme(theme) {
            const themes = {
                cyber: { bg1: '#1a1a3e', bg2: '#0a0a1a', btn1: ['#00d4ff', '#0099ff'] },
                neon: { bg1: '#2d1b4e', bg2: '#1a0f2e', btn1: ['#f093fb', '#f5576c'] },
                ocean: { bg1: '#1a3a5c', bg2: '#0a1a2e', btn1: ['#4facfe', '#00f2fe'] },
                sunset: { bg1: '#3a1a3e', bg2: '#1a0a1e', btn1: ['#fa709a', '#fee140'] },
                purple: { bg1: '#2a1a4e', bg2: '#1a0a2e', btn1: ['#a18cd1', '#fbc2eb'] },
                matrix: { bg1: '#0a2a1e', bg2: '#0a1a14', btn1: ['#43e97b', '#38f9d7'] }
            };
            const t = themes[theme];
            document.getElementById('bgColor1').value = t.bg1;
            document.getElementById('bgColor2').value = t.bg2;
            document.getElementById('btn1Color1').value = t.btn1[0];
            document.getElementById('btn1Color2').value = t.btn1[1];
            updateBgStyle();
            updateBtn1Style();
        }

        function resetDesign() {
            if (confirm('确定要重置吗？')) location.reload();
        }

        function exportDesign() {
            const design = {
                logo: document.getElementById('gameLogo').textContent,
                subtitle: document.getElementById('gameSubtitle').textContent
            };
            const blob = new Blob([JSON.stringify(design, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'ui-design.json';
            a.click();
            URL.revokeObjectURL(url);
        }

        createStars(50);
        update();
    </script>
</body>
</html>
